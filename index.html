<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>節拍訓練</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b14;--s1:#111823;--s2:#151f33;--s3:#1f2b42;--s4:#28344f;
  --br:#24324f;--br2:#324666;--br3:#4563a1;
  --tx:#e5ecff;--tx2:#8ea6d1;--tx3:#6f85ae;
  --q:#70c0ff;--qa:rgba(112,192,255,.14);--qg:rgba(112,192,255,.28);
  --e:#6ee2b9;--ea:rgba(110,226,185,.14);
  --sv:#f2c46f;--sva:rgba(242,196,111,.14);
  --de:#b38bff;--dea:rgba(179,139,255,.14);
  --h:#f8b86c;--ha:rgba(248,184,108,.14);
  --r:#8aa7d4;--ra:rgba(138,167,212,.14);
  --ok:#5bd3a8;--err:#f48ab0;--mk:#f5d564;--mkd:rgba(245,214,100,.14);
}
body{background:var(--bg);color:var(--tx);font-family:'Syne','Noto Sans TC',sans-serif;min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:inherit}
#hdr{position:sticky;top:0;z-index:200;padding:9px 14px;display:flex;align-items:center;gap:8px;
  background:rgba(7,11,20,.94);backdrop-filter:blur(18px);border-bottom:1px solid var(--br)}
.logo{flex:1;font-size:15px;font-weight:800;letter-spacing:-.03em}.logo span{color:var(--q)}
.ts-btn{padding:5px 9px;border-radius:7px;border:1px solid var(--br2);background:var(--s2);
  color:var(--tx2);font-size:11px;font-weight:700;font-family:'Space Mono',monospace;transition:all .18s}
.ts-btn:hover{background:var(--s3);color:var(--tx)}.ts-btn.on{background:var(--q);border-color:var(--q);color:#fff}
.hdr-sep{width:1px;height:18px;background:var(--br);flex-shrink:0}
#main{max-width:1060px;width:min(100%,1060px);margin:0 auto;padding:12px 12px 84px}
.sec-card{background:var(--s1);border:1px solid var(--br);border-radius:16px;padding:14px;margin-bottom:12px;transition:border-color .2s}
.sec-card.q-on{border-color:rgba(167,139,250,.32)}.sec-card.a-on{border-color:rgba(112,192,255,.32)}
.sec-lbl{font-size:10px;font-weight:700;color:var(--tx3);letter-spacing:.09em;text-transform:uppercase;
  font-family:'Space Mono',monospace;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.sec-tag{padding:2px 7px;border-radius:4px;font-size:9px;background:var(--s3);color:var(--tx3);border:1px solid var(--br)}
.beat-area{display:grid;gap:5px;margin-bottom:8px}
.bgrp{display:flex;flex-direction:column;border:1px solid var(--br);border-radius:10px;overflow:hidden;
  background:var(--s1);transition:border-color .2s,box-shadow .2s}
.bgrp.full{border-color:rgba(91,211,168,.4)}
.bgrp.correct{border-color:var(--ok);box-shadow:0 0 0 2px rgba(91,211,168,.14)}
.bgrp-lbl{text-align:center;padding:3px 0 2px;font-family:'Space Mono',monospace;font-size:8px;
  font-weight:700;color:var(--tx3);letter-spacing:.07em;background:var(--s2);border-bottom:1px solid var(--br)}
.bgrp-cells{display:flex;gap:2px;padding:3px;background:var(--s2)}
.nota{background:var(--s1);padding:4px 3px 5px;display:flex;align-items:center;justify-content:center;
  border-top:1px solid var(--br);min-height:62px}
.nota svg{display:block;width:100%;height:58px;overflow:visible}
.bgrp-dots{display:flex;gap:2px;padding:3px 3px 5px;background:var(--s1);border-top:1px solid var(--br)}
.cell{flex:1;border-radius:5px;background:var(--s3);border:1px solid var(--br);min-height:50px;
  position:relative;overflow:hidden;transition:background .14s,border-color .14s;
  cursor:default;display:flex;align-items:center;justify-content:center}
.cell.clk{cursor:pointer}.cell.filled:hover{opacity:.82;cursor:pointer}
.cell.playing{filter:brightness(2.2);transition:filter .04s}
.cell.nh{background:var(--ha);border-color:var(--h)}.cell.nq{background:var(--qa);border-color:var(--q)}
.cell.ne{background:var(--ea);border-color:var(--e)}.cell.nv{background:var(--sva);border-color:var(--sv)}
.cell.nd{background:var(--dea);border-color:var(--de)}.cell.nr{background:var(--ra);border-color:var(--r)}
.cell.pv-ok{background:rgba(112,192,255,.1)!important;border-color:rgba(112,192,255,.5)!important;cursor:pointer!important}
.cell.pv-bad{background:rgba(248,113,113,.08)!important;border-color:rgba(248,113,113,.45)!important;cursor:not-allowed!important}
.cell.c-ok{border-color:var(--ok)!important;background:rgba(91,211,168,.09)!important}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.cell.c-bad{animation:shk .3s ease;border-color:var(--err)!important;background:rgba(248,113,113,.09)!important}
@keyframes cpop{0%{transform:scaleY(0);opacity:0}65%{transform:scaleY(1.1)}100%{transform:scaleY(1);opacity:1}}
.cell.popin{animation:cpop .22s cubic-bezier(.34,1.56,.64,1);transform-origin:bottom}
.cinner{height:100%;width:100%;display:flex;align-items:center;justify-content:center;pointer-events:none}
.cico{width:22px;height:22px;flex-shrink:0}
.mdk{flex:1;min-height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  border-radius:4px;transition:background .15s;-webkit-tap-highlight-color:transparent}
.mdk::after{content:'';width:9px;height:9px;border-radius:50%;background:var(--s4);
  border:1px solid var(--br2);transition:all .18s}
.mdk.on{background:var(--mkd)}.mdk.on::after{background:var(--mk);border-color:var(--mk);box-shadow:0 0 5px rgba(250,204,21,.4)}
.pal-row{display:flex;align-items:flex-start;gap:5px;margin-top:10px}
.pal-tabs{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.pal-tab{width:40px;height:40px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;border:1px solid var(--br2);background:var(--s2);color:var(--tx3);cursor:pointer;transition:all .2s;flex-shrink:0}
.pal-tab:hover{background:var(--s3);color:var(--tx2)}
.pal-tab.on.t-n{background:rgba(112,192,255,.14);border-color:rgba(112,192,255,.45);color:var(--q)}
.pal-tab.on.t-r{background:rgba(138,167,212,.14);border-color:rgba(138,167,212,.45);color:var(--r)}
.pal-items{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;flex:1;-webkit-overflow-scrolling:touch;align-items:flex-start}
.pal-items::-webkit-scrollbar{height:3px}.pal-items::-webkit-scrollbar-thumb{background:var(--br3);border-radius:2px}
.pi{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:5px;
  background:var(--s1);border:1px solid var(--br);border-radius:10px;padding:9px 6px 7px;
  cursor:pointer;user-select:none;flex-shrink:0;width:82px;min-height:96px;
  -webkit-tap-highlight-color:transparent;position:relative;transition:all .18s}
.pi:active{transform:scale(.97)}.pi.sel{transform:scale(1.04);z-index:2}
.pi[data-c="h"]{border-color:rgba(248,184,108,.25)}.pi[data-c="h"]:hover,.pi[data-c="h"].sel{border-color:var(--h);box-shadow:0 0 0 2px var(--ha)}
.pi[data-c="q"]{border-color:rgba(112,192,255,.25)}.pi[data-c="q"]:hover,.pi[data-c="q"].sel{border-color:var(--q);box-shadow:0 0 0 2px var(--qa)}
.pi[data-c="e"]{border-color:rgba(110,226,185,.25)}.pi[data-c="e"]:hover,.pi[data-c="e"].sel{border-color:var(--e);box-shadow:0 0 0 2px var(--ea)}
.pi[data-c="s"]{border-color:rgba(242,196,111,.25)}.pi[data-c="s"]:hover,.pi[data-c="s"].sel{border-color:var(--sv);box-shadow:0 0 0 2px var(--sva)}
.pi[data-c="d"]{border-color:rgba(179,139,255,.25)}.pi[data-c="d"]:hover,.pi[data-c="d"].sel{border-color:var(--de);box-shadow:0 0 0 2px var(--dea)}
.pi[data-c="r"]{border-color:rgba(138,167,212,.25)}.pi[data-c="r"]:hover,.pi[data-c="r"].sel{border-color:var(--r);box-shadow:0 0 0 2px var(--ra)}
.pi[data-c="mk"]{border-color:rgba(245,214,100,.25)}.pi[data-c="mk"]:hover,.pi[data-c="mk"].sel{border-color:var(--mk);box-shadow:0 0 0 2px var(--mkd)}
/* palette icon wrapper */
.pi-ico{width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative}
.pi-ico>svg{display:block;width:100%;height:100%}
/* dot overlay on palette icon — always in DOM, hidden unless .pi.dotted */
.pi-ico .dot-ol{position:absolute;right:-5px;top:-3px;width:13px;height:13px;pointer-events:none;display:none}
.pi.dotted .pi-ico .dot-ol{display:block}
.pi-name{font-size:9px;font-weight:700;text-align:center;line-height:1.3;color:var(--tx);white-space:nowrap}
.pi.dot-btn .pi-ico{width:26px;height:26px}.pi.dot-btn{min-height:80px;width:66px;border-style:dashed}
.pi.dot-btn.sel{border-style:solid}
#bar{position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(7,11,20,.96);
  backdrop-filter:blur(18px);border-top:1px solid var(--br2);padding:8px 14px 12px;
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:8px}
.bar-l{display:flex;align-items:center;gap:6px;flex-shrink:0}
.bar-c{display:flex;align-items:center;justify-content:center;gap:6px}
.bar-r{display:flex;align-items:center;gap:4px;justify-content:flex-end;flex-wrap:wrap}
.bb{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:8px;
  font-size:11px;font-weight:700;border:1px solid var(--br2);background:var(--s2);color:var(--tx2);
  cursor:pointer;white-space:nowrap;transition:all .18s;font-family:'Syne',sans-serif}
.bb:hover{background:var(--s3);color:var(--tx)}
.bb.on{background:rgba(179,139,255,.2);border-color:var(--de);color:var(--de)}
.bb.tab-on{background:var(--s3);border-color:var(--br3);color:var(--tx)}
.bb.play{background:var(--q);border-color:var(--q);color:#fff;border-radius:50%;
  width:44px;height:44px;padding:0;justify-content:center;font-size:16px;box-shadow:0 4px 12px var(--qg)}
.bb.play:hover{opacity:.88}.bb.play-a{background:var(--e);border-color:var(--e);box-shadow:0 4px 12px rgba(110,226,185,.28)}
.bb.check{background:var(--ok);border-color:var(--ok);color:#0b1a10}
.bpm-sl{appearance:none;-webkit-appearance:none;width:100px;height:4px;border-radius:3px;
  background:var(--s3);outline:none;cursor:pointer}
.bpm-sl::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  background:var(--q);cursor:pointer;box-shadow:0 0 0 3px rgba(112,192,255,.18)}
.bpm-n{width:42px;background:var(--s2);border:1px solid var(--br2);border-radius:7px;
  padding:4px 5px;color:var(--tx);font-family:'Space Mono',monospace;font-size:11px;text-align:center}
#precount{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  z-index:300;background:rgba(0,0,0,.65);backdrop-filter:blur(6px)}
.pcn{font-size:96px;font-weight:800;font-family:'Space Mono',monospace;color:var(--q);
  opacity:0;line-height:1;text-align:center}
.pcsub{font-size:14px;color:var(--tx2);margin-top:6px;text-align:center}
@keyframes pcpop{0%{opacity:0;transform:scale(1.7)}18%{opacity:1;transform:scale(1)}82%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.4)}}
.pcn.run{animation:pcpop .44s ease forwards}
.fbmsg{position:fixed;left:50%;bottom:80px;transform:translateX(-50%) translateY(14px);
  display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--br);
  border-radius:9px;padding:9px 15px;font-size:12px;font-family:'Noto Sans TC',sans-serif;
  width:min(92%,360px);box-shadow:0 10px 26px rgba(0,0,0,.28);
  opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:220}
.fbmsg.show{transform:translateX(-50%) translateY(0);opacity:1}
.fbmsg.ok{border-color:rgba(91,211,168,.4);background:rgba(91,211,168,.07)}
.fbmsg.hint{border-color:rgba(251,146,60,.35);background:rgba(251,146,60,.06)}
.fbmsg.warn{border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.06)}
@keyframes fall{0%{transform:translateY(-40px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.cf{position:fixed;border-radius:2px;pointer-events:none;z-index:9999;animation:fall linear forwards}
@media(max-width:700px){
  #bar{grid-template-columns:1fr;justify-items:center;padding:9px 10px 13px}
  .bar-l,.bar-c,.bar-r{width:100%;justify-content:center;flex-wrap:wrap}
  .bpm-sl{width:120px}
}
@media(max-width:520px){
  .beat-area{grid-template-columns:repeat(2,1fr)!important}
  .cell{min-height:42px}.nota{min-height:54px}.nota svg{height:50px}
}
</style>
</head>
<body>
<div id="precount"><div><div class="pcn" id="pcn">1</div><div class="pcsub">預備拍</div></div></div>
<header id="hdr">
  <div class="logo"><span>節拍訓練</span></div>
  <div class="hdr-sep"></div>
  <span style="font-size:10px;color:var(--tx3);font-family:'Space Mono',monospace">拍號</span>
  <button class="ts-btn on" onclick="APP.setTS('4/4',this)">4/4</button>
  <button class="ts-btn" onclick="APP.setTS('3/4',this)">3/4</button>
  <button class="ts-btn" onclick="APP.setTS('2/4',this)">2/4</button>
  <button class="ts-btn" onclick="APP.setTS('6/8',this)">6/8</button>
</header>
<main id="main">
  <div class="sec-card" id="qcard">
    <div class="sec-lbl">題目節奏 <span class="sec-tag" id="qlbl">4/4</span></div>
    <div class="beat-area" id="qgrid"></div>
    <div class="pal-row">
      <div class="pal-tabs" id="qtabs">
        <button class="pal-tab on t-n" onclick="APP.palTab('q','n')" title="音符">
          <svg width="15" height="19" viewBox="0 0 34 44" fill="none"><ellipse cx="13" cy="37" rx="10" ry="7" transform="rotate(-15 13 37)" fill="currentColor"/><line x1="23" y1="34" x2="23" y2="5" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
        </button>
        <button class="pal-tab t-r" onclick="APP.palTab('q','r')" title="休止符">
          <svg width="13" height="19" viewBox="0 0 24 38" fill="none"><path d="M5 5 L19 13 L5 18 L19 27 L11 36" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="pal-items" id="qpal"></div>
    </div>
  </div>
  <div class="sec-card" id="acard" style="display:none">
    <div class="sec-lbl">立即測驗 <span class="sec-tag" id="albl">4/4</span></div>
    <div class="beat-area" id="agrid"></div>
    <div class="pal-row">
      <div class="pal-tabs" id="atabs">
        <button class="pal-tab on t-n" onclick="APP.palTab('a','n')" title="音符">
          <svg width="15" height="19" viewBox="0 0 34 44" fill="none"><ellipse cx="13" cy="37" rx="10" ry="7" transform="rotate(-15 13 37)" fill="currentColor"/><line x1="23" y1="34" x2="23" y2="5" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>
        </button>
        <button class="pal-tab t-r" onclick="APP.palTab('a','r')" title="休止符">
          <svg width="13" height="19" viewBox="0 0 24 38" fill="none"><path d="M5 5 L19 13 L5 18 L19 27 L11 36" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="pal-items" id="apal"></div>
    </div>
  </div>
</main>
<div class="fbmsg" id="fb"><span id="fbico">💡</span><span id="fbtxt"></span></div>
<input type="checkbox" id="togPre" checked hidden>
<div id="bar">
  <div class="bar-l">
    <span style="font-size:10px;color:var(--tx3);font-family:'Space Mono',monospace">BPM</span>
    <input type="range" id="bsl" class="bpm-sl" min="30" max="200" value="72">
    <input type="number" id="bnum" class="bpm-n" min="30" max="200" value="72">
  </div>
  <div class="bar-c">
    <button class="bb tab-on" id="tab-q" onclick="APP.switchTab('q')">題目節奏</button>
    <button class="bb" id="tab-a" onclick="APP.switchTab('a')">立即測驗</button>
  </div>
  <div class="bar-r" id="bar-r"></div>
</div>
<script>
// ══════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════
const AU=(()=>{
  let ctx=null;
  const init=()=>{try{ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}};
  const wake=()=>ctx?.state==='suspended'&&ctx.resume();
  const bpm=()=>parseInt(document.getElementById('bsl').value)||72;
  const s16=()=>(60/bpm())/4;
  function tone(t,dur,freq=392,vol=.22,type='triangle'){
    if(!ctx)return;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtValue=undefined;
    g.gain.linearRampToValueAtTime(.001,t+dur*.9);
    o.start(t);o.stop(t+dur);
  }
  const DUR16={half:8,quarter:4,eighth:2,sixteenth:1,'dotted-half':12,'dotted-quarter':6,'dotted-eighth':3};
  return{
    init,wake,bpm,s16,ctx:null,
    get ctx(){return ctx;},
    playNote(type,t){
      if(!ctx)return;
      if(type.includes('rest')){tone(t,.02,700,.05,'sine');return;}
      tone(t,(DUR16[type]||4)*s16());
    },
    click(t,acc){tone(t,.04,acc?1400:950,acc?.26:.13,'sine');},
    ding(ok){
      wake();if(!ctx)return;
      const t=ctx.currentTime;
      if(ok)[392,494,587].forEach((f,i)=>tone(t+i*.07,.36,f,.14,'sine'));
      else tone(t,.26,155,.14,'sawtooth');
    },
    precount(beats,cb){
      wake();if(!ctx){cb();return;}
      const bd=60/bpm(),now=ctx.currentTime+.05;
      const pd=document.getElementById('precount'),pn=document.getElementById('pcn');
      pd.style.display='flex';
      for(let i=0;i<beats;i++){
        this.click(now+i*bd,i===0);
        setTimeout(()=>{pn.textContent=i+1;pn.className='pcn';void pn.offsetWidth;pn.className='pcn run';},i*bd*1000);
      }
      setTimeout(()=>{pd.style.display='none';cb();},(beats*bd+.05)*1000);
    },
    // playPattern with optional metro clicks on each beat
    playPattern(notes,onStep,onDone,metro=false,spb=4){
      wake();if(!ctx)return;
      let t=ctx.currentTime+.05,total=0;
      if(metro){
        // schedule click on each beat boundary
        const beatDur=spb*s16();
        const totalBeats=Math.ceil(notes.reduce((s,n)=>s+n.duration,0)/spb);
        for(let i=0;i<totalBeats;i++) this.click(t+i*beatDur,i===0);
      }
      notes.forEach(n=>{
        const dur=n.duration*s16();
        this.playNote(n.type,t);
        const delay=(t-ctx.currentTime)*1000;
        setTimeout(()=>onStep&&onStep(n.startCell,n.duration),delay);
        t+=dur;total+=dur;
      });
      setTimeout(()=>onDone&&onDone(),total*1000+130);
    }
  };
})();

// ══════════════════════════════════════════════
// NOTE DEFINITIONS
// ══════════════════════════════════════════════
const ND={
  'half':               {name:'二分音符',   cells:8, c:'h',cls:'nh',rest:false},
  'quarter':            {name:'四分音符',   cells:4, c:'q',cls:'nq',rest:false},
  'eighth':             {name:'八分音符',   cells:2, c:'e',cls:'ne',rest:false},
  'sixteenth':          {name:'十六分音符', cells:1, c:'s',cls:'nv',rest:false},
  'dotted-half':        {name:'附點二分',   cells:12,c:'h',cls:'nd',rest:false},
  'dotted-quarter':     {name:'附點四分',   cells:6, c:'q',cls:'nd',rest:false},
  'dotted-eighth':      {name:'附點八分',   cells:3, c:'d',cls:'nd',rest:false},
  'half-rest':          {name:'二分休止',   cells:8, c:'r',cls:'nr',rest:true},
  'quarter-rest':       {name:'四分休止',   cells:4, c:'r',cls:'nr',rest:true},
  'eighth-rest':        {name:'八分休止',   cells:2, c:'r',cls:'nr',rest:true},
  'sixteenth-rest':     {name:'十六分休止', cells:1, c:'r',cls:'nr',rest:true},
  'dotted-half-rest':   {name:'附點二分休', cells:12,c:'r',cls:'nr',rest:true},
  'dotted-quarter-rest':{name:'附點四分休', cells:6, c:'r',cls:'nr',rest:true},
  'dotted-eighth-rest': {name:'附點八分休', cells:3, c:'r',cls:'nr',rest:true},
};
const COL={h:'var(--h)',q:'var(--q)',e:'var(--e)',s:'var(--sv)',d:'var(--de)',r:'var(--r)',mk:'var(--mk)'};
const DOTMAP={half:'dotted-half',quarter:'dotted-quarter',eighth:'dotted-eighth',
  'half-rest':'dotted-half-rest','quarter-rest':'dotted-quarter-rest','eighth-rest':'dotted-eighth-rest'};
const UNDOTMAP=Object.fromEntries(Object.entries(DOTMAP).map(([k,v])=>[v,k]));
const TS={'4/4':{beats:4,spb:4,total:16},'3/4':{beats:3,spb:4,total:12},'2/4':{beats:2,spb:4,total:8},'6/8':{beats:6,spb:2,total:12}};

  'eighth':       c=>`<svg viewBox="0 0 32 48" fill="none"><ellipse cx="11" cy="40" rx="9" ry="6" transform="rotate(-15 11 40)" fill="${c}"/><line x1="20" y1="37" x2="20" y2="5" stroke="${c}" stroke-width="2.6" stroke-linecap="round"/><path d="M20 5 Q32 13 20 25" stroke="${c}" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>`,

// dotted cell icons — base icon + inline dot (no overlay needed in cell)
const DOT_CELL_IC={

  'dotted-half-rest':   c=>`<svg viewBox="0 0 34 28" fill="none"><rect x="4" y="7" width="16" height="7" rx="1" fill="${c}"/><line x1="3" y1="14" x2="21" y2="14" stroke="${c}" stroke-width="1.4"/><circle cx="28" cy="9" r="3.5" fill="${c}"/></svg>`,
  'dotted-quarter-rest':c=>`<svg viewBox="0 0 34 38" fill="none"><path d="M5 5 L19 13 L5 18 L19 27 L11 36" stroke="${c}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="28" cy="15" r="3.5" fill="${c}"/></svg>`,

};
const DOT_SVG=c=>`<svg viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" fill="${c}"/></svg>`;

function cellIcon(type,colVar){
  if(DOT_CELL_IC[type]) return DOT_CELL_IC[type](colVar);
  const base=UNDOTMAP[type]||type;
  return BASE_IC[base]?BASE_IC[base](colVar):'';
}
function palIcoHtml(type,colVar){
  // base icon always present; dot-ol always in DOM, shown by .pi.dotted via CSS
  const base=UNDOTMAP[type]||type;
  const baseSvg=BASE_IC[base]?BASE_IC[base](colVar):'';
  return baseSvg+`<span class="dot-ol">${DOT_SVG(colVar)}</span>`;
}

// ══════════════════════════════════════════════
// NOTATION SVG per beat
// Rules:
//  - Only notes whose isStart is within [start,end) are drawn
//  - visSpan = slots this note occupies inside this beat (for layout only)
//  - Beaming: only realCells<=2 notes that are directly adjacent (no gap)
//  - dotted-eighth (realCells=3) is NOT beamable; draws isolated flag
//  - sixteenth adjacent to dotted-eighth: each draws own flags (no beam)
// ══════════════════════════════════════════════
function beatSVG(gs,beatIdx,cfg){
  const W=86,H=58,SY=44,ST=12,BH=4;
  const{spb}=cfg;
  const start=beatIdx*spb,end=start+spb;
  const CW=(W-6)/spb;
  const NRX=4.5,NRY=3;

  // Collect notes starting in this beat — iterate by slots, skip continuations
  const notes=[];
  for(let i=start;i<end;){
    const c=gs.cells[i];
    if(c.type&&c.isStart){
      const d=ND[c.type];
      const visSpan=Math.min(d.cells,end-i); // slots within this beat
      notes.push({type:c.type,offset:i-start,visSpan,realCells:d.cells,rest:d.rest});
      i+=d.cells; // skip entire note (may skip past end, that's fine)
    } else {
      i++;
    }
  }

  // Position: notehead center based on visSpan (what's visible in this beat)
  const pos=notes.map(n=>{
    const nx=3+n.offset*CW+n.visSpan*CW*.44;
    return{...n,nx,sx:nx+NRX+1};
  });

  let s=`<svg viewBox="0 0 ${W} ${H}" fill="none">`;
  s+=`<line x1="2" y1="${SY}" x2="${W-2}" y2="${SY}" stroke="currentColor" stroke-width=".9" opacity=".25"/>`;

  const pitch=pos.filter(n=>!n.rest);
  const rests=pos.filter(n=>n.rest);

  // Beam groups: only realCells===1 or realCells===2 (eighth, sixteenth)
  // dotted-eighth (realCells=3) never beams
  // Two notes beam only if they are slot-adjacent AND both realCells<=2
  const beamPairs=new Set(); // store index pairs as "i-j"
  const inBeam=new Set();
  for(let i=0;i<pitch.length-1;i++){
    const a=pitch[i],b=pitch[i+1];
    const adjBySlot=(a.offset+a.visSpan===b.offset);
    if(adjBySlot&&a.realCells<=2&&b.realCells<=2){
      inBeam.add(a);inBeam.add(b);
      beamPairs.add(i+'-'+(i+1));
    }
  }

  // Draw noteheads, dots, stems, flags
  pitch.forEach(n=>{
    const{nx,sx,type,realCells}=n;
    const dot=type.startsWith('dotted-');
    const open=type==='half'||type==='dotted-half';
    // notehead
    if(open) s+=`<ellipse cx="${f(nx)}" cy="${SY}" rx="${NRX}" ry="${NRY}" transform="rotate(-12 ${f(nx)} ${SY})" stroke="currentColor" stroke-width="1.7" fill="none"/>`;
    else     s+=`<ellipse cx="${f(nx)}" cy="${SY}" rx="${NRX}" ry="${NRY}" transform="rotate(-12 ${f(nx)} ${SY})" fill="currentColor"/>`;
    // augmentation dot
    if(dot) s+=`<circle cx="${f(nx+NRX+4)}" cy="${f(SY-2.5)}" r="2.3" fill="currentColor"/>`;
    // stem (all non-whole notes)
    s+=`<line x1="${f(sx)}" y1="${f(SY-NRY+.5)}" x2="${f(sx)}" y2="${ST}" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>`;
    // Isolated flags (not in beam)
    if(!inBeam.has(n)){
      if(realCells<=2){
        // primary flag (eighth or dotted-eighth)
        s+=`<path d="M${f(sx)} ${ST} Q${f(sx+11)} ${ST+7} ${f(sx)} ${ST+18}" stroke="currentColor" stroke-width="2.1" fill="none" stroke-linecap="round"/>`;
      }
      if(realCells===1){
        // secondary flag (sixteenth)
        s+=`<path d="M${f(sx)} ${ST+10} Q${f(sx+11)} ${ST+17} ${f(sx)} ${ST+27}" stroke="currentColor" stroke-width="2.1" fill="none" stroke-linecap="round"/>`;
      }
      if(realCells===3){
        // dotted-eighth: one flag (like eighth) — never beams
        s+=`<path d="M${f(sx)} ${ST} Q${f(sx+11)} ${ST+7} ${f(sx)} ${ST+18}" stroke="currentColor" stroke-width="2.1" fill="none" stroke-linecap="round"/>`;
      }
    }
  });

  // Draw rests
  rests.forEach(({type,nx})=>{
    const dot=type.startsWith('dotted-');
    const base=type.replace('dotted-','').replace('-rest','');
    if(base==='quarter') s+=`<path d="M${f(nx-4)} ${SY-13} L${f(nx+5)} ${SY-7} L${f(nx-3)} ${SY-2} L${f(nx+5)} ${SY+5} L${f(nx)} ${SY+12}" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>`;
    else if(base==='eighth'){
      s+=`<circle cx="${f(nx+2)}" cy="${SY-9}" r="2.7" fill="currentColor"/>`;
      s+=`<line x1="${f(nx+2)}" y1="${SY-6.5}" x2="${f(nx-3.5)}" y2="${SY+5}" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>`;
    } else if(base==='sixteenth'){
      s+=`<circle cx="${f(nx+2)}" cy="${SY-11}" r="2.4" fill="currentColor"/>`;
      s+=`<line x1="${f(nx+2)}" y1="${SY-8.5}" x2="${f(nx-2)}" y2="${SY}" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>`;
      s+=`<circle cx="${f(nx-1)}" cy="${SY+2}" r="2.4" fill="currentColor"/>`;
      s+=`<line x1="${f(nx-1)}" y1="${SY+4.5}" x2="${f(nx-5)}" y2="${SY+12}" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>`;
    } else if(base==='half'){
      s+=`<rect x="${f(nx-6)}" y="${SY-13}" width="12" height="5.5" rx="1" fill="currentColor"/>`;
      s+=`<line x1="${f(nx-8)}" y1="${SY-7}" x2="${f(nx+8)}" y2="${SY-7}" stroke="currentColor" stroke-width="1.3"/>`;
    }
    if(dot) s+=`<circle cx="${f(nx+9)}" cy="${SY-5}" r="2.3" fill="currentColor"/>`;
  });

  // Draw beams between adjacent beamable pairs
  for(let i=0;i<pitch.length-1;i++){
    if(!beamPairs.has(i+'-'+(i+1))) continue;
    const a=pitch[i],b=pitch[i+1];
    // Primary beam (always)
    s+=`<rect x="${f(a.sx)}" y="${f(ST-.5)}" width="${f(b.sx-a.sx)}" height="${BH}" rx="1.5" fill="currentColor"/>`;
    // Secondary beam only if BOTH are sixteenth (realCells===1)
    if(a.realCells===1&&b.realCells===1)
      s+=`<rect x="${f(a.sx)}" y="${f(ST+BH+4)}" width="${f(b.sx-a.sx)}" height="${BH}" rx="1.5" fill="currentColor"/>`;
  }
  return s+'</svg>';
}
const f=n=>n.toFixed(1);

// ══════════════════════════════════════════════
// GRID STATE
// ══════════════════════════════════════════════
function mkGrid(total=16){
  let cells=Array(total).fill(null).map(()=>({type:null,nid:null,isStart:false}));
  let notes=[];
  return{
    get cells(){return cells;},
    get notes(){return notes;},
    resize(n){cells=Array(n).fill(null).map(()=>({type:null,nid:null,isStart:false}));notes=[];},
    reset(){cells.forEach(c=>{c.type=null;c.nid=null;c.isStart=false;});notes.length=0;},
    canPlace(sc,type,spb=4){
      const d=ND[type];
      if(!d||sc<0||sc+d.cells>cells.length) return false;
      // enforce: note must start and end within the same beat
      const beatEnd=Math.floor(sc/spb)*spb+spb;
      if(sc+d.cells>beatEnd) return false;
      for(let i=sc;i<sc+d.cells;i++) if(cells[i].type) return false;
      return true;
    },
    place(sc,type,force=false,spb=4){
      const d=ND[type]; if(!d) return null;
      if(!force){
        if(!this.canPlace(sc,type,spb)) return null;
      } else {
        // force mode: still check bounds and empty cells, but skip beat-boundary check
        if(sc<0||sc+d.cells>cells.length) return null;
        for(let i=sc;i<sc+d.cells;i++) if(cells[i].type) return null;
      }
      const nid='n'+Date.now().toString(36)+Math.random().toString(36).slice(2,4);
      notes.push({id:nid,type,startCell:sc,duration:d.cells});
      for(let i=sc;i<sc+d.cells;i++)cells[i]={type,nid,isStart:i===sc};
      return nid;
    },
    remove(nid){
      const n=notes.find(x=>x.id===nid);if(!n)return;
      for(let i=n.startCell;i<n.startCell+n.duration;i++)cells[i]={type:null,nid:null,isStart:false};
      notes.splice(notes.indexOf(n),1);
    },
    removeAt(ci){const nid=cells[ci].nid;if(nid)this.remove(nid);},
    hasAny(){return cells.some(c=>c.type);},
    beatFull(b,spb){for(let i=b*spb;i<b*spb+spb;i++)if(!cells[i]?.type)return false;return true;},
    pattern(){return[...notes].sort((a,b)=>a.startCell-b.startCell);},
    noteStart(ci){
      const nid=cells[ci]?.nid;if(!nid)return ci;
      let i=ci;while(i>0&&cells[i].nid===nid&&!cells[i].isStart)i--;
      return i;
    }
  };
}
const GS={q:mkGrid(),a:mkGrid()};

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function renderGrid(key,showDots,cfg){
  const gs=GS[key],con=document.getElementById(key+'grid');
  con.innerHTML='';
  con.style.gridTemplateColumns=`repeat(${cfg.beats},1fr)`;
  for(let beat=0;beat<cfg.beats;beat++){
    const bg=document.createElement('div');
    bg.className='bgrp';bg.id=`${key}bg${beat}`;
    if(gs.beatFull(beat,cfg.spb))bg.classList.add('full');
    const lbl=document.createElement('div');
    lbl.className='bgrp-lbl';lbl.textContent=`第 ${beat+1} 拍`;bg.appendChild(lbl);
    const row=document.createElement('div');row.className='bgrp-cells';
    for(let s=0;s<cfg.spb;s++)row.appendChild(buildCell(key,beat*cfg.spb+s));
    bg.appendChild(row);
    const nota=document.createElement('div');nota.className='nota';
    nota.innerHTML=beatSVG(gs,beat,cfg);bg.appendChild(nota);
    if(showDots){
      const dr=document.createElement('div');dr.className='bgrp-dots';
      for(let s=0;s<cfg.spb;s++){
        const ci=beat*cfg.spb+s,dot=document.createElement('div');
        dot.className='mdk'+(APP.markers[ci]?' on':'');dot.id=`mk${ci}`;
        dot.onclick=()=>{APP.markers[ci]=!APP.markers[ci];dot.classList.toggle('on',APP.markers[ci]);};
        dr.appendChild(dot);
      }
      bg.appendChild(dr);
    }
    con.appendChild(bg);
  }
}

function buildCell(key,ci){
  const gs=GS[key],cs=gs.cells[ci];
  const c=document.createElement('div');c.className='cell';c.id=`${key}${ci}`;
  if(cs.type){
    const d=ND[cs.type];c.classList.add(d.cls,'filled');
    if(cs.isStart){
      const inn=document.createElement('div');inn.className='cinner';
      const ico=document.createElement('div');ico.className='cico';
      // Use combined icon (base+dot for dotted types)
      ico.innerHTML=cellIcon(cs.type,COL[d.c]);
      inn.appendChild(ico);c.appendChild(inn);
    }
  } else c.classList.add('clk');
  c.onclick=()=>APP.cellClick(key,ci);
  c.onpointerenter=()=>APP.hover(key,ci,true);
  c.onpointerleave=()=>APP.hover(key,ci,false);
  return c;
}

// ══════════════════════════════════════════════
// PALETTE
// ══════════════════════════════════════════════
const PAL_N=['half','quarter','eighth','sixteenth'];
const PAL_R=['half-rest','quarter-rest','eighth-rest','sixteenth-rest'];
const palTab={q:'n',a:'n'};

function buildPal(key){
  const types=palTab[key]==='n'?PAL_N:PAL_R;
  const con=document.getElementById(key+'pal');con.innerHTML='';
  types.forEach(type=>{
    const d=ND[type],colVar=COL[d.c];
    const pi=document.createElement('div');
    pi.className='pi';pi.dataset.type=type;pi.dataset.c=d.c;
    pi.innerHTML=`<div class="pi-ico">${palIcoHtml(type,colVar)}</div><div class="pi-name">${d.name}</div>`;
    pi.onclick=()=>APP.selType(key,type);
    con.appendChild(pi);
  });
  const dot=document.createElement('div');
  dot.className='pi dot-btn';dot.dataset.type='dot';dot.dataset.c='mk';
  dot.innerHTML=`<div class="pi-ico">${DOT_SVG(COL.mk)}</div><div class="pi-name">附點</div>`;
  dot.onclick=()=>APP.toggleDot(key);
  con.appendChild(dot);
  syncPalSel(key);
}

function syncPalSel(key){
  const{selType,selDot,selKey}=APP.sel;
  document.getElementById(key+'pal').querySelectorAll('.pi').forEach(pi=>{
    const on=selKey===key&&pi.dataset.type===selType;
    pi.classList.toggle('sel',on);
    pi.classList.toggle('dotted',on&&selDot);
  });
}

// ══════════════════════════════════════════════
// CHECK: beat-level duration sequence match
// rest ↔ note allowed if durations match per beat
// ══════════════════════════════════════════════
function checkAnswer(cfg){
  if(!GS.q.notes.length){fb('先設計題目！','hint');return;}
  if(!GS.a.hasAny()){fb('先填寫作答再驗證！','hint');return;}

  let allOk=true;
  for(let beat=0;beat<cfg.beats;beat++){
    const start=beat*cfg.spb;
    // Build ordered duration arrays for this beat from note start cells
    const qDurs=[],aDurs=[];
    for(let j=start;j<start+cfg.spb;j++){
      if(GS.q.cells[j]?.isStart) qDurs.push(ND[GS.q.cells[j].type].cells);
      if(GS.a.cells[j]?.isStart) aDurs.push(ND[GS.a.cells[j].type].cells);
    }
    const beatOk=JSON.stringify(qDurs)===JSON.stringify(aDurs);
    if(!beatOk)allOk=false;
    document.getElementById(`${beat===0?'a':'a'}bg${beat}`)?.classList.toggle('correct',beatOk);
    document.getElementById(`abg${beat}`)?.classList.toggle('correct',beatOk);
  }

  // cell highlight: mark each cell ok/bad based on duration match at that position
  for(let i=0;i<cfg.total;i++){
    const qT=GS.q.cells[i].type,aT=GS.a.cells[i].type;
    const qD=qT?ND[qT].cells:0,aD=aT?ND[aT].cells:0;
    // ok if: both empty, exact match, or same duration (rest↔note ok)
    const ok=(qT===aT)||(qT&&aT&&qD===aD);
    const c=document.getElementById(`a${i}`);if(!c)continue;
    c.classList.remove('c-ok','c-bad');
    if(ok)c.classList.add('c-ok');
    else{c.classList.add('c-bad');setTimeout(()=>c.classList.remove('c-bad'),480);}
  }

  AU.ding(allOk);
  if(allOk){fb('完全正確！🎉','ok',3500);confetti();}
  else fb('節奏有些不對，繼續努力！','hint',3000);
}

// APP
// ══════════════════════════════════════════════
const APP={
  tab:'q',ts:'4/4',cfg:TS['4/4'],
  sel:{selType:null,selDot:false,selKey:null},
  markers:Array(16).fill(false),
  metroOn:false,

  setTS(ts,btn){
    this.ts=ts;this.cfg=TS[ts];
    document.querySelectorAll('.ts-btn').forEach(b=>b.classList.toggle('on',b===btn));
    document.getElementById('qlbl').textContent=ts;
    document.getElementById('albl').textContent=ts;
    GS.q.resize(this.cfg.total);GS.a.resize(this.cfg.total);
    this.markers=Array(this.cfg.total).fill(false);
    renderGrid('q',false,this.cfg);renderGrid('a',true,this.cfg);
    this.sel={selType:null,selDot:false,selKey:null};
    syncPalSel('q');syncPalSel('a');
  },

  switchTab(key){
    this.tab=key;
    document.getElementById('qcard').style.display=key==='q'?'block':'none';
    document.getElementById('acard').style.display=key==='a'?'block':'none';
    document.getElementById('tab-q').className='bb'+(key==='q'?' tab-on':'');
    document.getElementById('tab-a').className='bb'+(key==='a'?' tab-on':'');
    this.renderBar();
  },

  palTab(key,tab){
    palTab[key]=tab;
    document.getElementById(key+'tabs').querySelectorAll('.pal-tab').forEach((b,i)=>{
      b.classList.toggle('on',i===(tab==='n'?0:1));
    });
    buildPal(key);
  },

  // FIX: selecting a new note always resets dot to false
  selType(key,type){
    AU.wake();
    const s=this.sel;
    if(s.selType===type&&s.selKey===key){
      s.selType=null;s.selDot=false;s.selKey=null;
    } else {
      s.selType=type;s.selDot=false;// ← always reset dot when picking new note
      s.selKey=key;
    }
    document.getElementById('qcard').classList.toggle('q-on',!!s.selType&&key==='q');
    document.getElementById('acard').classList.toggle('a-on',!!s.selType&&key==='a');
    syncPalSel(key);syncPalSel(key==='q'?'a':'q');
  },

  toggleDot(key){
    AU.wake();
    const s=this.sel;
    if(!s.selType||s.selKey!==key){fb('請先選擇一個音符或休止符','hint');return;}
    if(!DOTMAP[s.selType]&&!UNDOTMAP[s.selType]){fb('此音符無法附點','hint');return;}
    s.selDot=!s.selDot;
    syncPalSel(key);
  },

  effective(){
    const{selType,selDot}=this.sel;
    if(!selType)return null;
    return(selDot&&DOTMAP[selType])?DOTMAP[selType]:selType;
  },

  cellClick(key,ci){
    AU.wake();
    const gs=GS[key];
    if(gs.cells[ci].type){
      const sc=gs.noteStart(ci);
      gs.removeAt(ci);
      renderGrid(key,key==='a',this.cfg);
      if(this.sel.selType&&this.sel.selKey===key)this._drop(key,sc);
      return;
    }
    if(!this.sel.selType||this.sel.selKey!==key)return;
    this._drop(key,ci);
  },

  hover(key,ci,on){
    if(!on){this._clearPv(key);return;}
    const type=this.effective();
    if(!type||this.sel.selKey!==key)return;
    const d=ND[type],ok=GS[key].canPlace(ci,type,this.cfg.spb);
    for(let i=ci;i<Math.min(ci+d.cells,GS[key].cells.length);i++)
      document.getElementById(`${key}${i}`)?.classList.add(ok?'pv-ok':'pv-bad');
  },

  _clearPv(key){
    GS[key].cells.forEach((_,i)=>document.getElementById(`${key}${i}`)?.classList.remove('pv-ok','pv-bad'));
  },

  _drop(key,ci){
    const type=this.effective();if(!type)return;
    const gs=GS[key],nid=gs.place(ci,type,false,this.cfg.spb);
    if(nid){
      renderGrid(key,key==='a',this.cfg);
      const d=ND[type];
      for(let i=ci;i<ci+d.cells;i++){
        const c=document.getElementById(`${key}${i}`);
        c?.classList.add('popin');setTimeout(()=>c?.classList.remove('popin'),230);
      }
      AU.playNote(type,AU.ctx?AU.ctx.currentTime:0);
      this._clearPv(key);
      const b=Math.floor(ci/this.cfg.spb);
      if(key==='a'&&gs.beatFull(b,this.cfg.spb))fb(`第${b+1}拍完整！`,'ok',1800);
    } else {
      AU.ding(false);fb('此格放不下！','hint');
    }
  },

  play(key){
    AU.wake();
    const pat=GS[key].pattern();
    if(!pat.length){fb('先放音符再播放！','hint');return;}
    const go=()=>{
      AU.playPattern(pat,
        (sc,dur)=>{
          for(let i=sc;i<sc+dur;i++){
            const c=document.getElementById(`${key}${i}`);
            if(c){c.classList.add('playing');setTimeout(()=>c.classList.remove('playing'),dur*AU.s16()*1000-25);}
          }
        },
        ()=>{},
        this.metroOn,
        this.cfg.spb
      );
    };
    if(document.getElementById('togPre').checked)AU.precount(this.cfg.beats,go);else go();
  },

  check(){checkAnswer(this.cfg);},

  random(){
    GS.q.reset();
    const pool=['half','quarter','quarter','eighth','eighth','sixteenth','half-rest','quarter-rest','eighth-rest'];
    const{spb,total}=this.cfg;let idx=0;
    while(idx<total){
      const rem=spb-(idx%spb);
      const valid=pool.filter(t=>ND[t]&&ND[t].cells<=rem);
      const choice=valid[~~(Math.random()*valid.length)]||'sixteenth';
      GS.q.place(idx,choice,true);idx+=ND[choice].cells;
    }
    renderGrid('q',false,this.cfg);
    this.sel={selType:null,selDot:false,selKey:null};
    syncPalSel('q');syncPalSel('a');
    fb('新題目已生成','info',1500);
  },

  clearQ(){
    GS.q.reset();renderGrid('q',false,this.cfg);
    this.sel.selType=null;syncPalSel('q');
    document.getElementById('qcard').classList.remove('q-on');
  },
  clearA(){
    GS.a.reset();this.markers.fill(false);
    GS.a.cells.forEach((_,i)=>document.getElementById(`mk${i}`)?.classList.remove('on'));
    renderGrid('a',true,this.cfg);
    GS.a.cells.forEach((_,i)=>document.getElementById(`a${i}`)?.classList.remove('c-ok','c-bad'));
    for(let b=0;b<this.cfg.beats;b++)document.getElementById(`abg${b}`)?.classList.remove('correct');
    fb('作答已清除','info',1600);
  },

  toggleMetro(){this.metroOn=!this.metroOn;this.renderBar();},
  togglePre(){const c=document.getElementById('togPre');c.checked=!c.checked;this.renderBar();},

  renderBar(){
    const key=this.tab,bar=document.getElementById('bar-r');
    const pre=document.getElementById('togPre')?.checked,mo=this.metroOn;
    const tools=`<button class="bb ${mo?'on':''}" onclick="APP.toggleMetro()">節拍器</button><button class="bb ${pre?'on':''}" onclick="APP.togglePre()">預備拍</button>`;
    if(key==='q'){
      bar.innerHTML=`${tools}<button class="bb" onclick="APP.clearQ()">清除</button><button class="bb" onclick="APP.random()">隨機</button><button class="bb play" onclick="APP.play('q')" title="播放題目">▶</button>`;
    } else {
      bar.innerHTML=`${tools}<button class="bb" onclick="APP.clearA()">清除</button><button class="bb check" onclick="APP.check()">驗證</button><button class="bb" onclick="APP.random()">隨機</button><button class="bb play" onclick="APP.play('q')" title="播放題目">▶</button><button class="bb play play-a" onclick="APP.play('a')" title="播放作答">♪</button>`;
    }
  }
};

// FEEDBACK + CONFETTI
let fbT=null;
function fb(msg,type='info',dur=3000){
  const e=document.getElementById('fb');
  e.className=`fbmsg ${type} show`;
  document.getElementById('fbico').textContent=type==='ok'?'🎉':type==='warn'?'⛔':type==='hint'?'⚠️':'💡';
  document.getElementById('fbtxt').textContent=msg;
  if(fbT)clearTimeout(fbT);
  fbT=setTimeout(()=>e.classList.remove('show'),dur);
}
function confetti(){
  const cols=['var(--q)','var(--e)','var(--sv)','var(--de)','var(--ok)','#fff'];
  for(let i=0;i<32;i++){
    const p=document.createElement('div');p.className='cf';
    p.style.cssText=`left:${Math.random()*100}vw;top:-5px;background:${cols[~~(Math.random()*cols.length)]};animation-duration:${.6+Math.random()}s;animation-delay:${Math.random()*.35}s;width:${5+~~(Math.random()*5)}px;height:${5+~~(Math.random()*5)}px`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),2200);
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  AU.init();
  buildPal('q');buildPal('a');
  renderGrid('q',false,APP.cfg);renderGrid('a',true,APP.cfg);
  APP.switchTab('q');
  fb('選音符 → 點格子放置；再點已填格子可替換','info',5000);
  const sl=document.getElementById('bsl'),nm=document.getElementById('bnum');
  const syncBPM=v=>{v=Math.max(30,Math.min(200,parseInt(v)||72));sl.value=v;nm.value=v;};
  sl.oninput=e=>syncBPM(e.target.value);
  nm.onchange=e=>syncBPM(e.target.value);
  nm.onkeydown=e=>{if(e.key==='ArrowUp'||e.key==='ArrowDown'){syncBPM(parseInt(nm.value)+(e.key==='ArrowUp'?1:-1));e.preventDefault();}};
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){
      APP.sel.selType=null;APP.sel.selDot=false;
      syncPalSel('q');syncPalSel('a');
      document.getElementById('qcard').classList.remove('q-on');
      document.getElementById('acard').classList.remove('a-on');
    }
  });
  document.addEventListener('pointerdown',()=>AU.wake(),{passive:true});
});
</script>
