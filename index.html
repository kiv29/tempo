<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>節奏時間軸</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#070b14;--s1:#111823;--s2:#151f33;--s3:#1f2b42;--s4:#28344f;
  --br:#24324f;--br2:#324666;--br3:#4563a1;
  --tx:#e5ecff;--tx2:#8ea6d1;--tx3:#6f85ae;
  --q:#70c0ff;--qa:rgba(112,192,255,.14);--qg:rgba(112,192,255,.3);
  --e:#6ee2b9;--ea:rgba(110,226,185,.14);--eg:rgba(110,226,185,.3);
  --sv:#f2c46f;--sva:rgba(242,196,111,.14);--svg_:rgba(242,196,111,.3);
  --de:#b38bff;--dea:rgba(179,139,255,.14);--deg:rgba(179,139,255,.3);
  --r:#8aa7d4;--ra:rgba(138,167,212,.14);--rg:rgba(138,167,212,.28);
  --ok:#5bd3a8;--err:#f48ab0;--mk:#f5d564;--mkd:rgba(245,214,100,.15);
  --hbg:rgba(7,11,20,.9);--rad:12px;--rads:8px;--radl:18px
}
body{background:var(--bg);color:var(--tx);font-family:'Syne','Noto Sans TC',sans-serif;
  min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
button{cursor:pointer;font-family:inherit}

/* HEADER */
#hdr{position:sticky;top:0;z-index:200;padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  background:var(--hbg);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--br);transition:background .3s}
.logo{display:flex;align-items:center;gap:8px;flex:1}
.logo-ico{width:28px;height:28px;background:linear-gradient(135deg,var(--q),var(--de));
  border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-txt{font-size:14px;font-weight:700;letter-spacing:-.03em}
.logo-txt span{color:var(--q)}
.hbtns{display:flex;gap:5px;flex-shrink:0}
.hbtn{display:flex;align-items:center;gap:4px;padding:5px 10px;
  border-radius:var(--rads);border:1px solid var(--br2);
  background:var(--s2);color:var(--tx2);font-size:11px;font-weight:700;
  transition:all .18s;white-space:nowrap}
.hbtn:hover{background:var(--s3);color:var(--tx);border-color:var(--br3)}
.hbtn.on{background:var(--de);border-color:var(--de);color:#fff}

/* MAIN */
#main{max-width:1200px;width:min(100%,1200px);margin:0 auto;padding:20px 24px 80px}

/* CTRL BAR */
.ctrlbar{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;justify-content:space-between;
  margin-bottom:14px;padding:10px 12px;
  background:var(--s1);border:1px solid var(--br);border-radius:var(--rad);overflow:hidden}
.ctrlbar>*{min-width:0}
.bpmw{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tx2);flex-shrink:1;min-width:0}
.bpms{-webkit-appearance:none;width:82px;height:3px;border-radius:2px;
  background:var(--s3);outline:none;cursor:pointer}
.bpms::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;
  border-radius:50%;background:var(--q);cursor:pointer}
.bpmv{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;min-width:28px}
.vsep{width:1px;height:20px;background:var(--br);flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;
  border-radius:var(--rads);font-size:10px;font-weight:700;
  border:1px solid transparent;transition:all .18s;white-space:nowrap}
.btn svg{flex-shrink:0}
.btn-p{background:var(--q);color:#fff;border-color:var(--q)}
.btn-p:hover{opacity:.88;box-shadow:0 0 10px var(--qg)}
.btn-sec{background:var(--s2);color:var(--tx);border-color:var(--br2)}
.btn-sec:hover{background:var(--s3);border-color:var(--br3)}
.btn-gh{background:transparent;color:var(--tx2);border-color:var(--br)}
.btn-gh:hover{color:var(--tx);border-color:var(--br2)}
.btn-ok{background:var(--ok);color:#0e1a00;border-color:var(--ok)}
.btn-ok:hover{box-shadow:0 0 9px rgba(163,230,53,.4)}
.btn-warn{background:rgba(248,113,113,.15);color:var(--err);border-color:var(--err)}
.btn-warn:hover{background:rgba(248,113,113,.25)}

/* PRECOUNT */
#precount{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  z-index:300;background:rgba(0,0,0,.65);backdrop-filter:blur(5px)}
pcwrap{text-align:center}
.pcn{font-size:96px;font-weight:800;font-family:'Space Mono',monospace;
  color:var(--q);opacity:0;line-height:1}
.pcsub{font-size:15px;color:var(--tx2);margin-top:6px;font-family:'Noto Sans TC',sans-serif}
@keyframes pcpop{0%{opacity:0;transform:scale(1.7)}18%{opacity:1;transform:scale(1)}
  82%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.4)}}
.pcn.run{animation:pcpop .44s ease forwards}

/* SECTION CARD */
.sec-card{background:var(--s1);border:1px solid var(--br);border-radius:var(--radl);
  padding:14px;margin-bottom:14px;transition:border-color .2s,box-shadow .2s}
.sec-card.t-active{border-color:rgba(167,139,250,.4);box-shadow:0 0 0 2px rgba(167,139,250,.07)}
.sec-card.s-active{border-color:rgba(79,143,255,.35);box-shadow:0 0 0 2px rgba(79,143,255,.06)}
.sec-hdr{display:flex;flex-direction:column;align-items:flex-start;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sec-title{font-size:12px;font-weight:700;color:var(--tx2);letter-spacing:.06em;text-transform:uppercase;font-family:'Space Mono',monospace}
.sec-btns{display:flex;gap:5px;align-items:center;margin-left:0;flex-wrap:wrap;margin-top:8px;width:100%}

/* BEAT AREA GRID */
.beat-area{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
@media(max-width:600px) and (orientation:portrait){.beat-area{grid-template-columns:repeat(2,1fr);gap:5px}}
@media(max-width:900px) and (orientation:landscape){.beat-area{grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:3px}}

/* BEAT GROUP */
.bgrp{display:flex;flex-direction:column;border:1px solid var(--br);
  border-radius:8px;overflow:hidden;background:var(--s1);transition:border-color .2s}
.bgrp.hover-ok{border-color:var(--br3)}
.bgrp.beat-full{border-color:rgba(163,230,53,.45)}
.bgrp-label{text-align:center;padding:3px 0 2px;
  font-family:'Space Mono',monospace;font-size:8px;font-weight:700;
  color:var(--tx3);letter-spacing:.07em;background:var(--s2)}
.bgrp-cells{display:flex;gap:2px;padding:3px;background:var(--s2)}

/* NOTATION AREA */
.nota{background:var(--s1);padding:4px 6px 6px;min-height:75px;
  display:flex;align-items:center;justify-content:center;
  border-top:1px solid var(--br);color:var(--tx)}
.nota.empty{min-height:32px;padding:2px;border-top:1px solid var(--br)}
.nota svg{display:block;width:100%;height:75px;overflow:visible}

/* MARKER DOTS */
.bgrp-dots{display:flex;gap:2px;padding:3px 3px 5px;background:var(--s1);
  border-top:1px solid var(--br)}
.mdk{flex:1;min-height:30px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:4px;transition:background .15s;
  -webkit-tap-highlight-color:transparent}
.mdk:active{background:rgba(250,204,21,.1)}
.mdk::after{content:'';width:9px;height:9px;border-radius:50%;
  background:var(--s4);border:1px solid var(--br2);transition:all .18s;flex-shrink:0}
.mdk.on{background:var(--mkd)}
.mdk.on::after{background:var(--mk);border-color:var(--mk);box-shadow:0 0 5px rgba(250,204,21,.45)}
@media(max-width:500px){.mdk{min-height:40px}.mdk::after{width:13px;height:13px}}

/* CELLS */
.cell{flex:1;height:62px;border-radius:5px;background:var(--s3);
  border:1px solid var(--br);position:relative;overflow:hidden;
  transition:background .14s,border-color .14s;cursor:default;
  display:flex;align-items:center;justify-content:center}
@media(max-width:600px) and (orientation:portrait){.cell{height:52px}.nota svg{height:58px}}
@media(max-width:900px) and (orientation:landscape){.cell{height:38px}.nota{min-height:44px;padding:2px 4px}.nota svg{height:44px}.bgrp-label{padding:2px 0 1px;font-size:7px}.bgrp-cells{gap:1px;padding:2px}.bgrp-dots{padding:2px 2px 3px}.mdk{min-height:20px}.mdk::after{width:7px;height:7px}}
.cell.clickable{cursor:pointer}
.cell.clickable:hover,.cell.filled{cursor:pointer}
.cell.filled:hover{opacity:.82}
.cell.playing{filter:brightness(1.9);transition:filter .04s}
.cell.nq{background:var(--qa);border-color:var(--q);color:var(--q)}
.cell.ne{background:var(--ea);border-color:var(--e);color:var(--e)}
.cell.nv{background:var(--sva);border-color:var(--sv);color:var(--sv)}
.cell.nd{background:var(--dea);border-color:var(--de);color:var(--de)}
.cell.nrq,.cell.nre,.cell.nrv,.cell.nrd{background:var(--ra);border-color:var(--r);color:var(--r)}
.cell.qhide{background:var(--s3)!important;border-color:var(--br)!important;cursor:default!important}
.cell.qhide .cinner{display:none}
.qmark{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--tx3)}
/* preview */
.pv-q{background:rgba(79,143,255,.1)!important;border-color:rgba(79,143,255,.6)!important;cursor:pointer!important}
.pv-e{background:rgba(52,211,153,.1)!important;border-color:rgba(52,211,153,.6)!important;cursor:pointer!important}
.pv-s{background:rgba(251,146,60,.1)!important;border-color:rgba(251,146,60,.6)!important;cursor:pointer!important}
.pv-d{background:rgba(167,139,250,.1)!important;border-color:rgba(167,139,250,.6)!important;cursor:pointer!important}
.pv-r{background:rgba(107,122,153,.1)!important;border-color:rgba(107,122,153,.6)!important;cursor:pointer!important}
.pv-bad{background:rgba(248,113,113,.1)!important;border-color:rgba(248,113,113,.5)!important;cursor:not-allowed!important}
/* check result */
.cell.c-ok{border-color:var(--ok)!important;background:rgba(163,230,53,.1)!important}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.cell.c-bad{animation:shk .3s ease;border-color:var(--err)!important;background:rgba(248,113,113,.1)!important}
@keyframes cpop{0%{transform:scaleY(0);opacity:0}65%{transform:scaleY(1.1)}100%{transform:scaleY(1);opacity:1}}
.cell.popin{animation:cpop .23s cubic-bezier(.34,1.56,.64,1);transform-origin:bottom}
.cinner{height:100%;width:100%;display:flex;align-items:center;padding:0 3px;gap:2px;pointer-events:none}
.cico{width:15px;height:15px;flex-shrink:0}
.clbl{font-size:6px;font-family:'Space Mono',monospace;font-weight:700;opacity:.75;white-space:nowrap;overflow:hidden}

/* PALETTE */
.pw{margin-top:10px}
.ptt{display:none}
.pt-row{display:flex;flex-wrap:nowrap;gap:8px;margin-bottom:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.pt-row::-webkit-scrollbar{height:4px}
.pt-row::-webkit-scrollbar-track{background:var(--s2)}
.pt-row::-webkit-scrollbar-thumb{background:var(--br3);border-radius:2px}

/* PALETTE TAB SWITCHER */
.pal-tabs{display:flex;gap:0;margin-bottom:10px;background:var(--s2);border:1px solid var(--br);border-radius:10px;padding:3px;width:fit-content}
.pal-tab{padding:6px 18px;border-radius:7px;font-size:11px;font-weight:700;font-family:'Space Mono',monospace;border:none;background:transparent;color:var(--tx3);cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);letter-spacing:.03em;white-space:nowrap}
.pal-tab.active{background:var(--s4);color:var(--tx);box-shadow:0 2px 8px rgba(0,0,0,.35)}
.pal-tab.active.t-note{background:linear-gradient(135deg,rgba(112,192,255,.22),rgba(110,226,185,.18));color:var(--tx);border:1px solid rgba(112,192,255,.3)}
.pal-tab.active.t-rest{background:linear-gradient(135deg,rgba(138,167,212,.2),rgba(138,167,212,.1));color:var(--r);border:1px solid rgba(138,167,212,.35)}

/* PALETTE SLIDE CONTAINER */
.pal-slide-wrap{position:relative;overflow:hidden}
.pal-slide{display:flex;gap:8px;padding-bottom:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  transition:opacity .28s ease,transform .28s cubic-bezier(.4,0,.2,1);
  flex-wrap:nowrap}
.pal-slide::-webkit-scrollbar{height:3px}.pal-slide::-webkit-scrollbar-track{background:transparent}.pal-slide::-webkit-scrollbar-thumb{background:var(--br3);border-radius:2px}
.pal-slide.exit-left{opacity:0;transform:translateX(-18px);pointer-events:none;position:absolute;top:0;left:0;width:100%}
.pal-slide.exit-right{opacity:0;transform:translateX(18px);pointer-events:none;position:absolute;top:0;left:0;width:100%}
.pal-slide.enter-left{animation:slideFromRight .28s cubic-bezier(.4,0,.2,1) forwards}
.pal-slide.enter-right{animation:slideFromLeft .28s cubic-bezier(.4,0,.2,1) forwards}
@keyframes slideFromRight{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideFromLeft{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
/* PALETTE INLINE ROW — Tab 和音符在同一列 */
.pal-inline-row{display:flex;align-items:center;gap:6px}
.pal-tabs-inline{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.pal-tabs-inline .pal-tab{padding:8px 10px;border-radius:7px;font-size:14px;
  min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}
@media(max-width:900px) and (orientation:landscape){
  .pal-tabs-inline .pal-tab{padding:5px 8px;min-width:30px;min-height:30px;font-size:13px}
  .pi{width:80px;min-height:100px;padding:10px 8px 8px}
  .pi-ico{width:36px;height:36px}
  .pi-name{font-size:9px}
  .pw{margin-top:5px}
  .fbarea{min-height:28px;margin:3px 0}
  .fbmsg{padding:5px 10px;font-size:11px}
}

/* 手機橫屏整體 padding 收緊 */
@media(max-width:900px) and (orientation:landscape){
  #main{padding:6px 8px 10px}
  .sec-card{padding:8px;margin-bottom:6px}
  .sec-hdr{margin-bottom:6px;gap:4px}
  .sec-btns{gap:4px;margin-top:4px}
  .ctrlbar{padding:6px 10px;margin-bottom:8px}
  .btn{padding:5px 8px;font-size:9px}
}

/* Tab switcher 原本的橫向版本在 inline 模式隱藏 */
.pal-tabs{display:none}
.pi{display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:8px;
  background:var(--s1);border:1px solid var(--br);border-radius:12px;
  padding:16px 12px 12px;cursor:pointer;transition:all .18s;
  user-select:none;flex-shrink:0;width:108px;min-height:130px;-webkit-tap-highlight-color:transparent}
.pi:active{transform:scale(.96)}
.pi.sel{transform:scale(1.03);z-index:2}
.pi[data-type=quarter]{border-color:rgba(79,143,255,.3)}.pi[data-type=quarter]:hover,.pi[data-type=quarter].sel{border-color:var(--q);box-shadow:0 0 0 2px var(--qa),0 4px 12px var(--qg)}
.pi[data-type=eighth]{border-color:rgba(52,211,153,.3)}.pi[data-type=eighth]:hover,.pi[data-type=eighth].sel{border-color:var(--e);box-shadow:0 0 0 2px var(--ea),0 4px 12px var(--eg)}
.pi[data-type=sixteenth]{border-color:rgba(251,146,60,.3)}.pi[data-type=sixteenth]:hover,.pi[data-type=sixteenth].sel{border-color:var(--sv);box-shadow:0 0 0 2px var(--sva),0 4px 12px var(--svg_)}
.pi[data-type="dotted-eighth"]{border-color:rgba(167,139,250,.3)}.pi[data-type="dotted-eighth"]:hover,.pi[data-type="dotted-eighth"].sel{border-color:var(--de);box-shadow:0 0 0 2px var(--dea),0 4px 12px var(--deg)}
.pi[data-type$="-rest"]{border-color:rgba(107,122,153,.3)}.pi[data-type$="-rest"]:hover,.pi[data-type$="-rest"].sel{border-color:var(--r);box-shadow:0 0 0 2px var(--ra),0 4px 12px var(--rg)}
.pi-ico{width:52px;height:52px;display:flex;align-items:center;justify-content:center}
.pi-name{font-size:11px;font-weight:700;text-align:center;line-height:1.3;color:var(--tx);white-space:nowrap}
.pi-beat{display:flex;gap:2px;margin-top:1px}
.pi-bd{height:4px;flex:1;border-radius:1px;border:1px solid}

/* FEEDBACK */
.fbarea{min-height:42px;display:flex;align-items:center;justify-content:center;margin:6px 0}
.fbmsg{display:flex;align-items:center;gap:7px;background:var(--s2);
  border:1px solid var(--br);border-radius:9px;padding:8px 14px;
  font-size:12px;font-weight:500;font-family:'Noto Sans TC',sans-serif;
  transform:translateY(6px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.fbmsg.show{transform:translateY(0);opacity:1}
.fbmsg.ok{border-color:rgba(163,230,53,.4);background:rgba(163,230,53,.07)}
.fbmsg.info{border-color:rgba(79,143,255,.35);background:rgba(79,143,255,.06)}
.fbmsg.hint{border-color:rgba(251,146,60,.35);background:rgba(251,146,60,.06)}
.fbmsg.warn{border-color:rgba(248,113,113,.35);background:rgba(248,113,113,.06)}

/* GLOW & CONFETTI */
@keyframes glow{0%{box-shadow:0 0 0 0 rgba(163,230,53,0)}50%{box-shadow:0 0 20px 0 rgba(163,230,53,.28)}100%{box-shadow:0 0 0 0 rgba(163,230,53,0)}}
.do-glow{animation:glow .55s ease 3}
@keyframes fall{0%{transform:translateY(-60px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.cf{position:fixed;border-radius:2px;pointer-events:none;z-index:9998;animation:fall linear forwards}

/* HIDDEN PANEL */
.hpanel{display:none}.hpanel.show{display:block}
@media(max-width:600px){
  #main{max-width:100%;padding:10px 8px 80px}
  .ctrlbar{gap:5px;padding:8px 10px;flex-wrap:wrap}
  .bpmw{gap:4px;font-size:10px}
  .bpmw span{display:none}
  .bpms{width:50px}
  #bpminput{width:44px;margin-left:4px}
  .btn{padding:6px 9px;font-size:10px}
  label span{display:none}
}
@media(max-width:500px){
  .pi{min-width:80px;padding:10px 12px}
  .pi-ico{width:32px;height:32px}
  .pi-name{font-size:8px}
}
@media(max-width:900px){
  #main{padding-bottom:80px}
}
</style>
</head>
<body>
<div id="precount"><div class="pcwrap"><div class="pcn" id="pcn">1</div><div class="pcsub">預備拍</div></div></div>


<main id="main">

<!-- CONTROL BAR -->
<div class="ctrlbar">
  <div class="bpmw">
    <span>BPM</span>
    <input type="range" class="bpms" id="bpms" min="40" max="200" value="76">
    <input type="number" id="bpminput" min="40" max="200" value="76" style="width:48px;margin-left:6px;background:var(--s2);border:1px solid var(--br2);border-radius:8px;padding:4px 6px;color:var(--tx);font-family:'Space Mono',monospace;font-size:10px;text-align:center">
    <span class="bpmv" id="bpmv">76</span>
  </div>
  <div class="vsep"></div>
  <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--tx2);cursor:pointer;flex-shrink:0;min-width:0">
    <span style="white-space:nowrap;">預備拍</span>
    <div style="position:relative;width:32px;height:17px;flex-shrink:0">
      <input type="checkbox" id="togPre" checked style="opacity:0;position:absolute;width:0;height:0">
      <div id="togTrack" style="position:absolute;inset:0;background:var(--q);border:1px solid var(--q);border-radius:100px;cursor:pointer;transition:all .18s">
        <div id="togThumb" style="position:absolute;top:1px;right:1px;width:13px;height:13px;border-radius:50%;background:#fff;transition:all .18s;box-shadow:0 1px 3px rgba(0,0,0,.3)"></div>
      </div>
    </div>
  </label>
  <div class="vsep"></div>
  <button class="btn btn-p" id="btnPlay">
    <svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M2 1.5L10 6L2 10.5V1.5Z"/></svg>播放
  </button>
  <button class="btn btn-sec" id="btnMetro">節拍音</button>
</div>


<div style="display:flex;gap:0;margin-bottom:14px;background:var(--s2);border:1px solid var(--br);border-radius:var(--rad);overflow:hidden">
  <button id="tabQ" onclick="switchTab('Q')" style="flex:1;padding:10px;font-weight:700;font-size:13px;border:none;background:var(--q);color:#fff;cursor:pointer">
    🎵 題目節奏
  </button>

<script>
// ─── AUDIO (unified pitch = G4 392Hz for all notes) ───
const AU={
  ctx:null, bpm:76,
  FREQ:392, // G4 — all notes same pitch
  init(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}},
  wake(){if(this.ctx?.state==='suspended')this.ctx.resume()},
  get s16(){return(60/this.bpm)/4},
  tone(t,dur,vol=.22){
    if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.connect(g);g.connect(this.ctx.destination);
    o.type='triangle';o.frequency.value=this.FREQ;
    g.gain.setValueAtTime(vol,t);
    g.gain.setValueAtTime(vol,t+dur*.55);
    g.gain.exponentialRampToValueAtTime(.001,t+dur*.9);
    o.start(t);o.stop(t+dur);
  },
  restTick(t){
    if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.connect(g);g.connect(this.ctx.destination);
    o.frequency.value=700;g.gain.setValueAtTime(.06,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.022);
    o.start(t);o.stop(t+.025);
  },
  click(t,acc){
    if(!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.connect(g);g.connect(this.ctx.destination);
    o.frequency.value=acc?1400:950;
    g.gain.setValueAtTime(acc?.28:.14,t);
    g.gain.exponentialRampToValueAtTime(.001,t+.038);
    o.start(t);o.stop(t+.045);
  },
  playNote(type,t){
    if(type.includes('rest')){this.restTick(t);return;}
    const dm={quarter:this.s16*3.2,eighth:this.s16*1.6,
      'dotted-eighth':this.s16*2.4,sixteenth:this.s16*.75};
    this.tone(t,dm[type]||this.s16);
  },
  ding(ok){
    this.wake();if(!this.ctx)return;
    const t=this.ctx.currentTime;
    if(ok){[this.FREQ,this.FREQ*1.26,this.FREQ*1.5].forEach((f,i)=>{
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.connect(g);g.connect(this.ctx.destination);
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.16,t+i*.07);g.gain.exponentialRampToValueAtTime(.001,t+i*.07+.38);
      o.start(t+i*.07);o.stop(t+i*.07+.4);
    });}else{
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.connect(g);g.connect(this.ctx.destination);
      o.type='sawtooth';o.frequency.value=155;
      g.gain.setValueAtTime(.16,t);g.gain.exponentialRampToValueAtTime(.001,t+.26);
      o.start(t);o.stop(t+.28);
    }
  },
  precount(cb){
    this.wake();if(!this.ctx)return;
    this.bpm=parseInt(D('bpms').value)||76;
    const bd=60/this.bpm,now=this.ctx.currentTime+.05;
    for(let i=0;i<4;i++)this.click(now+i*bd,i===0);
    const pd=D('precount'),pn=D('pcn');
    pd.style.display='flex';
    for(let i=0;i<4;i++){
      setTimeout(()=>{
        pn.textContent=i+1; // 1,2,3,4 count UP
        pn.className='pcn';void pn.offsetWidth;pn.className='pcn run';
      },(i*bd+.05)*1000);
    }
    setTimeout(()=>{pd.style.display='none';cb();},(4*bd+.05)*1000);
  },
  playPattern(notes,onStep,onDone){
    this.wake();if(!this.ctx)return;
    this.bpm=parseInt(D('bpms').value)||76;
    let t=this.ctx.currentTime+.05,total=0;
    notes.forEach(n=>{
      const dur=n.duration*this.s16;
      this.playNote(n.type,t);
      const delay=(t-this.ctx.currentTime)*1000;
      setTimeout(()=>onStep&&onStep(n.startCell,n.duration),delay);
      t+=dur;total+=dur;
    });
    setTimeout(()=>onDone&&onDone(),total*1000+110);
  }
};

// ─── NOTE DEFINITIONS ───
const ND={
  'quarter':             {name:'四分音符',     short:'四',   cells:4,col:'var(--q)', bg:'var(--qa)',cls:'nq', pv:'pv-q',isRest:false},
  'eighth':              {name:'八分音符',     short:'八',   cells:2,col:'var(--e)', bg:'var(--ea)',cls:'ne', pv:'pv-e',isRest:false},
  'dotted-eighth':       {name:'附點八分音符', short:'附八', cells:3,col:'var(--de)',bg:'var(--dea)',cls:'nd',pv:'pv-d',isRest:false},
  'sixteenth':           {name:'十六分音符',   short:'十六', cells:1,col:'var(--sv)',bg:'var(--sva)',cls:'nv',pv:'pv-s',isRest:false},
  'quarter-rest':        {name:'四分休止符',   short:'四休', cells:4,col:'var(--r)', bg:'var(--ra)',cls:'nrq',pv:'pv-r',isRest:true},
  'eighth-rest':         {name:'八分休止符',   short:'八休', cells:2,col:'var(--r)', bg:'var(--ra)',cls:'nre',pv:'pv-r',isRest:true},
  'dotted-eighth-rest':  {name:'附點八分休止符',short:'附休',cells:3,col:'var(--r)', bg:'var(--ra)',cls:'nrd',pv:'pv-r',isRest:true},
  'sixteenth-rest':      {name:'十六分休止符', short:'十休', cells:1,col:'var(--r)', bg:'var(--ra)',cls:'nrv',pv:'pv-r',isRest:true},
};

// ─── PALETTE ICONS (SVG functions) ───
const COL={q:'var(--q)',e:'var(--e)',d:'var(--de)',sv:'var(--sv)',r:'var(--r)'};
const PICO={
  'quarter':c=>`<svg viewBox="0 0 34 44" fill="none"><ellipse cx="13" cy="37" rx="10" ry="7" transform="rotate(-15 13 37)" fill="${c}"/><line x1="23" y1="34" x2="23" y2="5" stroke="${c}" stroke-width="3" stroke-linecap="round"/></svg>`,
  'eighth':c=>`<svg viewBox="0 0 34 44" fill="none"><ellipse cx="13" cy="37" rx="10" ry="7" transform="rotate(-15 13 37)" fill="${c}"/><line x1="23" y1="34" x2="23" y2="5" stroke="${c}" stroke-width="3" stroke-linecap="round"/><path d="M23 5 Q34 13 23 24" stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  'dotted-eighth':c=>`<svg viewBox="0 0 42 44" fill="none"><ellipse cx="13" cy="37" rx="10" ry="7" transform="rotate(-15 13 37)" fill="${c}"/><circle cx="28" cy="36" r="3.5" fill="${c}"/><line x1="23" y1="34" x2="23" y2="5" stroke="${c}" stroke-width="3" stroke-linecap="round"/><path d="M23 5 Q34 13 23 24" stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  'sixteenth':c=>`<svg viewBox="0 0 34 44" fill="none"><ellipse cx="13" cy="37" rx="10" ry="7" transform="rotate(-15 13 37)" fill="${c}"/><line x1="23" y1="34" x2="23" y2="5" stroke="${c}" stroke-width="3" stroke-linecap="round"/><path d="M23 5 Q34 13 23 23" stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M23 14 Q34 22 23 32" stroke="${c}" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`,
  'quarter-rest':c=>`<svg viewBox="0 0 24 38" fill="none"><path d="M5 5 L19 13 L5 18 L19 27 L11 36" stroke="${c}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  'eighth-rest':c=>`<svg viewBox="0 0 24 30" fill="none"><circle cx="17" cy="8" r="5" fill="${c}"/><path d="M17 13 L5 26" stroke="${c}" stroke-width="3" stroke-linecap="round"/></svg>`,
  'dotted-eighth-rest':c=>`<svg viewBox="0 0 32 30" fill="none"><circle cx="17" cy="8" r="5" fill="${c}"/><path d="M17 13 L5 26" stroke="${c}" stroke-width="3" stroke-linecap="round"/><circle cx="26" cy="16" r="3" fill="${c}"/></svg>`,
  'sixteenth-rest':c=>`<svg viewBox="0 0 24 34" fill="none"><circle cx="17" cy="6" r="4" fill="${c}"/><path d="M17 10 L5 22" stroke="${c}" stroke-width="3" stroke-linecap="round"/><circle cx="12" cy="19" r="4" fill="${c}"/><path d="M12 23 L3 32" stroke="${c}" stroke-width="2.5" stroke-linecap="round"/></svg>`,
};
// Small cell icons (same viewBox, CSS sizes them)
const CICO=PICO;

// ─── NOTATION RENDERER ───
const f=n=>Number(n).toFixed(1);

function beatToNotes(gs,beat){
  const notes=[],start=beat*4,end=start+4;
  let i=start;
  while(i<end){
    const cell=gs.cells[i];
    if(cell.type&&cell.isStart){
      const d=ND[cell.type];
      let cnt=0;
      for(let j=i;j<end&&gs.cells[j].type===cell.type&&(j===i||!gs.cells[j].isStart);j++)cnt++;
      notes.push({type:cell.type,cells:d.cells,cellsHere:cnt,offset:i-start,isRest:d.isRest});
      i+=cnt;
    }else if(cell.type&&!cell.isStart){i++;}
    else{i++;}
  }
  return notes;
}

function renderNotaSVG(notes){
  const hasAny=notes.some(n=>n.type);
  if(!hasAny)return null;
  const W=90,H=65;
  const SY=50,ST=16; // staff Y, stem top Y
  const BH=4,BG=5;  // beam height, beam gap
  const NW=5.5,NH=3.8; // notehead radii
  const CW=(W-10)/4; // cell width

  const pos=notes.filter(n=>n.type).map(n=>{
    const x=5+n.offset*CW;
    const nx=x+n.cellsHere*CW*0.45; // notehead center X
    const sx=nx+NW+0.8; // stem X
    return{...n,nx,sx};
  });
  const pitch=pos.filter(n=>!n.isRest);
  const rests=pos.filter(n=>n.isRest);
  // beamable: eighth (cells<=2) OR dotted-eighth (cells=3, type includes dotted)
  const beam=pitch.filter(n=>n.cells<=2||n.type.includes('dotted'));
  const beamGroups=[];
  let group=[];
  beam.forEach(n=>{
    if(!group.length){
      group=[n];
    } else {
      const prev=group[group.length-1];
      if(n.offset===prev.offset+prev.cells){
        group.push(n);
      } else {
        beamGroups.push(group);
        group=[n];
      }
    }
  });
  if(group.length)beamGroups.push(group);
  const hasBeam=beamGroups.some(g=>g.length>=2);
  const beamGroupByNote=new Map();
  beamGroups.forEach(g=>g.forEach(n=>beamGroupByNote.set(n,g)));

  let s=`<svg viewBox="0 0 ${W} ${H}" fill="none" xmlns="http://www.w3.org/2000/svg">`;
  // staff line
  s+=`<line x1="2" y1="${SY}" x2="${W-2}" y2="${SY}" stroke="currentColor" stroke-width="1" opacity=".35"/>`;

  // noteheads + stems
  pitch.forEach(n=>{
    const cx=n.nx;
    s+=`<ellipse cx="${f(cx)}" cy="${f(SY)}" rx="${NW}" ry="${NH}" transform="rotate(-12 ${f(cx)} ${f(SY)})" fill="currentColor"/>`;
    if(n.type.includes('dotted')){
      s+=`<circle cx="${f(cx+NW+3.5)}" cy="${f(SY-2)}" r="2" fill="currentColor"/>`;
    }
    // stem for all pitch notes
    s+=`<line x1="${f(n.sx)}" y1="${f(SY-NH+0.5)}" x2="${f(n.sx)}" y2="${f(ST)}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>`;
    // isolated flags (when not in beam group)
    const ng=beamGroupByNote.get(n);
    if(ng?.length===1){
      s+=`<path d="M${f(n.sx)} ${f(ST)} Q${f(n.sx+11)} ${f(ST+7)} ${f(n.sx)} ${f(ST+17)}" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>`;
      if(n.cells===1){ // 16th: double flag
        s+=`<path d="M${f(n.sx)} ${f(ST+10)} Q${f(n.sx+11)} ${f(ST+17)} ${f(n.sx)} ${f(ST+27)}" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>`;
      }
    }
  });

  // rest symbols
  rests.forEach(n=>{
    const cx=n.nx;
    if(n.type==='quarter-rest'){
      s+=`<path d="M${f(cx-4)} ${f(SY-13)} L${f(cx+5)} ${f(SY-7)} L${f(cx-3)} ${f(SY-2)} L${f(cx+5)} ${f(SY+5)} L${f(cx)} ${f(SY+12)}" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>`;
    }else if(n.type==='eighth-rest'||n.type==='dotted-eighth-rest'){
      s+=`<circle cx="${f(cx+2)}" cy="${f(SY-9)}" r="2.8" fill="currentColor"/>`;
      s+=`<line x1="${f(cx+2)}" y1="${f(SY-6.5)}" x2="${f(cx-3.5)}" y2="${f(SY+5)}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>`;
      if(n.type==='dotted-eighth-rest')s+=`<circle cx="${f(cx+8)}" cy="${f(SY)}" r="1.8" fill="currentColor"/>`;
    }else if(n.type==='sixteenth-rest'){
      s+=`<circle cx="${f(cx+2)}" cy="${f(SY-11)}" r="2.5" fill="currentColor"/>`;
      s+=`<line x1="${f(cx+2)}" y1="${f(SY-8.5)}" x2="${f(cx-2)}" y2="${f(SY)}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>`;
      s+=`<circle cx="${f(cx-1)}" cy="${f(SY+2)}" r="2.5" fill="currentColor"/>`;
      s+=`<line x1="${f(cx-1)}" y1="${f(SY+4.5)}" x2="${f(cx-5)}" y2="${f(SY+12)}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>`;
    }
  });

  // primary beam for adjacent beam groups only
  beamGroups.forEach(group=>{
    if(group.length<2)return;
    const bx1=group[0].sx, bx2=group[group.length-1].sx;
    s+=`<rect x="${f(bx1)}" y="${f(ST-0.5)}" width="${f(bx2-bx1)}" height="${BH}" rx="1.5" fill="currentColor"/>`;
    // secondary beam for consecutive 16th note runs inside this group
    if(group.some(n=>n.cells===1)){
      let rs=null,ri=-1;
      group.forEach((n,gi)=>{
        const is16=n.cells===1;
        const next16=gi<group.length-1&&group[gi+1].cells===1&&n.offset+n.cellsHere===group[gi+1].offset;
        if(is16){
          if(rs===null){rs=n.sx;ri=gi;}
          if(!next16){
            const by=ST-0.5+BH+BG;
            if(rs===n.sx){// single 16th stub
              const sl=ri>0;
              s+=`<rect x="${f(sl?n.sx-11:n.sx)}" y="${f(by)}" width="11" height="${BH}" rx="1.5" fill="currentColor"/>`;
            }else{
              s+=`<rect x="${f(rs)}" y="${f(by)}" width="${f(n.sx-rs)}" height="${BH}" rx="1.5" fill="currentColor"/>`;
            }
            rs=null;
          }
        }
      });
    }
  });

  s+=`</svg>`;
  return s;
}

// ─── GRID STATE ───
function mkCells(){return Array(16).fill(null).map(()=>({type:null,nid:null,isStart:false}))}
function mkGS(){
  return{
    cells:mkCells(),notes:[],
    reset(){this.cells=mkCells();this.notes=[]},
    canPlace(sc,type){
      const d=ND[type];if(!d||sc<0||sc+d.cells>16)return false;
      if(!ST8.crossBeat){const bEnd=(Math.floor(sc/4)+1)*4;if(sc+d.cells>bEnd)return false;}
      for(let i=sc;i<sc+d.cells;i++)if(this.cells[i].type)return false;
      return true;
    },
    place(sc,type,force=false){
      if(!force&&!this.canPlace(sc,type))return null;
      const d=ND[type];
      const nid='n'+Date.now()+Math.random().toString(36).slice(2,5);
      this.notes.push({id:nid,type,startCell:sc,duration:d.cells});
      for(let i=sc;i<sc+d.cells;i++)this.cells[i]={type,nid,isStart:i===sc};
      return nid;
    },
    remove(nid){
      const n=this.notes.find(x=>x.id===nid);if(!n)return;
      for(let i=n.startCell;i<n.startCell+n.duration;i++)this.cells[i]={type:null,nid:null,isStart:false};
      this.notes=this.notes.filter(x=>x.id!==nid);
    },
    removeAt(ci){if(this.cells[ci].nid)this.remove(this.cells[ci].nid);},
    isFull(){return this.cells.every(c=>c.type)},
    beatFull(b){for(let i=b*4;i<b*4+4;i++)if(!this.cells[i].type)return false;return true;},
    pattern(){return[...this.notes].sort((a,b)=>a.startCell-b.startCell)}
  };
}
const QS=mkGS(),AS=mkGS();

// ─── APP STATE ───
const ST8={
  crossBeat:false,teacherMode:false,metroSound:false,
  selectedType:null,editTarget:'A',
  markers:Array(16).fill(false)
};

const D=id=>document.getElementById(id);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e};

// ─── RENDER BEAT GROUPS ───
function renderBeats(gs,containerId,pfx,isQ,showDots){
  const con=D(containerId);con.innerHTML='';
  for(let beat=0;beat<4;beat++){
    const bg=el('div','bgrp');bg.id=`${pfx}bg${beat}`;
    // label
    const lbl=el('div','bgrp-label');lbl.textContent=`第 ${beat+1} 拍`;bg.appendChild(lbl);
    // cells
    const row=el('div','bgrp-cells');
    for(let s=0;s<4;s++){const ci=beat*4+s;row.appendChild(buildCell(ci,pfx,gs,isQ));}
    bg.appendChild(row);
    // notation display
    const notaDiv=el('div','nota');notaDiv.id=`${pfx}nota${beat}`;
    const bNotes=beatToNotes(gs,beat);
    const svg=renderNotaSVG(bNotes);
    if(svg){notaDiv.innerHTML=svg;}else{notaDiv.classList.add('empty');}
    bg.appendChild(notaDiv);
    // marker dots (answer only)
    if(showDots){
      const dr=el('div','bgrp-dots');
      for(let s=0;s<4;s++){
        const ci=beat*4+s;
        const dot=el('div','mdk');dot.id=`mk${ci}`;
        if(ST8.markers[ci])dot.classList.add('on');
        dot.addEventListener('click',()=>toggleMark(ci));
        dr.appendChild(dot);
      }
      bg.appendChild(dr);
    }
    if(gs.beatFull(beat))bg.classList.add('beat-full');
    con.appendChild(bg);
  }
}

function buildCell(ci,pfx,gs,isQ){
  const cs=gs.cells[ci];
  const c=el('div','cell');c.id=`${pfx}${ci}`;c.dataset.i=ci;
  if(cs.type){
    const d=ND[cs.type];c.classList.add(d.cls,'filled');
    if(cs.isStart){
      const inn=el('div','cinner');
      const ico=el('div','cico');ico.innerHTML=CICO[cs.type](d.col);inn.appendChild(ico);
      c.appendChild(inn);
    }
  }else{c.classList.add('clickable');}
  c.addEventListener('click',()=>onCellClick(ci,pfx,gs,isQ));
  c.addEventListener('pointerenter',()=>{
    if(!ST8.selectedType)return;
    if(ST8.editTarget!==(isQ?'Q':'A'))return;
    showPreview(ST8.selectedType,ci,pfx,gs);
    D(`${pfx}bg${Math.floor(ci/4)}`)?.classList.add('hover-ok');
  });
  c.addEventListener('pointerleave',()=>{
    clearPreview(pfx);
    for(let b=0;b<4;b++)D(`${pfx}bg${b}`)?.classList.remove('hover-ok');
  });
  return c;
}

function onCellClick(ci,pfx,gs,isQ){
  AU.wake();
  const cs=gs.cells[ci];
  if(cs.type){
    if(isQ&&!ST8.teacherMode)return;
    gs.removeAt(ci);refresh(isQ?'Q':'A');return;
  }
  if(!ST8.selectedType)return;
  if(ST8.editTarget!==(isQ?'Q':'A'))return;
  doDrop(ci,ST8.selectedType,gs,pfx,isQ);
}

// ─── PREVIEW ───
function showPreview(type,sc,pfx,gs){
  clearPreview(pfx);if(sc<0||!type)return;
  const d=ND[type];if(!d)return;
  const ok=gs.canPlace(sc,type);
  for(let i=sc;i<Math.min(sc+d.cells,16);i++){
    const c=D(`${pfx}${i}`);if(!c)continue;c.classList.add(ok?d.pv:'pv-bad');
  }
}
function clearPreview(pfx){
  ['pv-q','pv-e','pv-s','pv-d','pv-r','pv-bad'].forEach(cls=>{
    for(let i=0;i<16;i++)D(`${pfx}${i}`)?.classList.remove(cls);
  });
}

// ─── DROP ───
function doDrop(ci,type,gs,pfx,isQ){
  const d=ND[type];
  const bEnd=(Math.floor(ci/4)+1)*4;
  const crossesBeat=!ST8.crossBeat&&(ci+d.cells>bEnd);
  const occupied=gs.cells.slice(ci,Math.min(ci+d.cells,16)).some(c=>c.type);
  const nid=gs.place(ci,type);
  if(nid){
    refresh(isQ?'Q':'A');
    for(let i=ci;i<ci+d.cells;i++){const c=D(`${pfx}${i}`);if(c){c.classList.add('popin');setTimeout(()=>c.classList.remove('popin'),270);}}
    AU.playNote(type,AU.ctx?AU.ctx.currentTime:.0);
    if(!isQ){
      showFB(`✓ ${d.name}（${d.cells}格）→ 第${Math.floor(ci/4)+1}拍`,'info');
      if(AS.beatFull(Math.floor(ci/4)))showFB(`第${Math.floor(ci/4)+1}拍完整！`,'ok',2000);
    }
    clearPreview(pfx);
  }else{
    AU.ding(false);
    if(crossesBeat&&!occupied)showFB('⛔ 音符不可跨拍！請開啟右上「跨拍」按鈕','warn',4000);
    else showFB('此格放不下，請找空格！','hint');
    const c=D(`${pfx}${ci}`);if(c){c.classList.add('pv-bad');setTimeout(()=>c.classList.remove('pv-bad'),480);}
  }
}

// ─── REFRESH ───
function refresh(target){
  if(target==='Q'||target==='both'){
    renderBeats(QS,'qgrid','qc',true,false);
    D('btnQClear').style.display=QS.notes.length?'':'none';
  }
  if(target==='A'||target==='both'){
    renderBeats(AS,'agrid','ac',false,true);
    for(let i=0;i<16;i++)if(ST8.markers[i])D(`mk${i}`)?.classList.add('on');
  }
}

// ─── MARKER DOTS ───
function toggleMark(ci){
  ST8.markers[ci]=!ST8.markers[ci];
  const dot=D(`mk${ci}`);if(dot)dot.classList.toggle('on',ST8.markers[ci]);
  AU.wake();if(AU.ctx)AU.restTick(AU.ctx.currentTime);
}

// ─── STAMP SELECT ───
function selectNote(type,target){
  ST8.selectedType=type;ST8.editTarget=target;
  document.querySelectorAll('.pi').forEach(p=>{
    p.classList.toggle('sel',p.dataset.type===type&&p.dataset.target===target);
  });
  if(type){
    const isRest=ND[type]?.isRest;
    const prefix=target==='Q'?'t':'s';
    const needed=isRest?'rest':'note';
    if(palState[prefix]!==needed)switchPalTab(prefix,needed);
  }
  D('qcard').classList.toggle('t-active',!!type&&target==='Q');
  D('acard').classList.toggle('s-active',!!type&&target==='A');
}

// ─── BUILD PALETTE ───
function buildPal(types,cid,target){
  const pal=D(cid);if(!pal)return;pal.innerHTML='';
  types.forEach(type=>{
    const d=ND[type];
    const item=el('div','pi');item.dataset.type=type;item.dataset.target=target;
    let bv='<div class="pi-beat">';
    for(let i=0;i<4;i++){
      const on=i<d.cells;
      bv+=`<div class="pi-bd ${on?'on':'off'}" style="background:${on?d.col:'var(--s4)'};border-color:${on?d.col:'var(--br2)'}"></div>`;
    }
    bv+='</div>';
    item.innerHTML=`<div class="pi-ico">${PICO[type](d.col)}</div><div class="pi-name">${d.name}</div>${bv}`;
    item.addEventListener('click',()=>{
      AU.wake();
      if(ST8.selectedType===type&&ST8.editTarget===target)selectNote(null,'A');
      else selectNote(type,target);
    });
    pal.appendChild(item);
  });
}

const NOTES_ONLY=['quarter','eighth','dotted-eighth','sixteenth'];
const RESTS_ONLY=['quarter-rest','eighth-rest','dotted-eighth-rest','sixteenth-rest'];
const palState={t:'note',s:'note'};

function switchPalTab(prefix,tab){
  if(palState[prefix]===tab)return;
  palState[prefix]=tab;

  const noteBtn=D(`${prefix}pal-tab-note`);
  const restBtn=D(`${prefix}pal-tab-rest`);
  if(noteBtn)noteBtn.classList.toggle('active',tab==='note');
  if(restBtn)restBtn.classList.toggle('active',tab==='rest');

  const goingRight=(tab==='rest');
  const wrapId=`${prefix}pal-wrap`;
  const wrap=D(wrapId);if(!wrap)return;

  const oldRow=wrap.querySelector('.pal-slide');
  if(oldRow){
    oldRow.classList.add(goingRight?'exit-left':'exit-right');
    setTimeout(()=>oldRow.remove(),300);
  }

  const newRow=document.createElement('div');
  newRow.className=`pal-slide ${goingRight?'enter-left':'enter-right'}`;
  newRow.id=`${prefix}pal-items`;
  const target=prefix==='t'?'Q':'A';
  const types=tab==='note'?NOTES_ONLY:RESTS_ONLY;
  types.forEach(type=>{
    const d=ND[type];
    const item=el('div','pi');item.dataset.type=type;item.dataset.target=target;
    let bv='<div class="pi-beat">';
    for(let i=0;i<4;i++){
      const on=i<d.cells;
      bv+=`<div class="pi-bd ${on?'on':'off'}" style="background:${on?d.col:'var(--s4)'};border-color:${on?d.col:'var(--br2)'}"></div>`;
    }
    bv+='</div>';
    item.innerHTML=`<div class="pi-ico">${PICO[type](d.col)}</div><div class="pi-name">${d.name}</div>${bv}`;
    item.addEventListener('click',()=>{
      AU.wake();
      if(ST8.selectedType===type&&ST8.editTarget===target)selectNote(null,'A');
      else selectNote(type,target);
    });
    newRow.appendChild(item);
  });
  wrap.appendChild(newRow);

  if(ST8.selectedType&&ST8.editTarget===target){
    newRow.querySelectorAll('.pi').forEach(p=>{
      p.classList.toggle('sel',p.dataset.type===ST8.selectedType);
    });
  }
}

// ─── PLAYBACK ───
function playMain(){
  AU.wake();
  const pat=QS.pattern();
  if(!pat.length){showFB('先設計或隨機一個題目！','hint');return;}
  const go=()=>{
    D('btnPlay').textContent='⏸ 播放中…';
    AU.bpm=parseInt(D('bpms').value)||76;
    if(ST8.metroSound && AU.ctx){
      const now=AU.ctx.currentTime + 0.05;
      const beatInterval=60/AU.bpm;
      for(let i=0;i<4;i++)AU.click(now + i*beatInterval, i===0);
    }
    AU.playPattern(pat,
      (sc,dur)=>{for(let i=sc;i<sc+dur;i++){const c=D(`qc${i}`);if(!c)return;c.classList.add('playing');setTimeout(()=>c.classList.remove('playing'),(dur*AU.s16*1000)-25);}},
      ()=>{D('btnPlay').innerHTML='<svg width="10" height="10" viewBox="0 0 12 12" fill="currentColor"><path d="M2 1.5L10 6L2 10.5V1.5Z"/></svg>播放';}
    );
  };
  if(D('togPre').checked)AU.precount(go);else go();
}

// ─── TEACHER MODE ───
function toggleTeacher(){
  ST8.teacherMode=!ST8.teacherMode;
  const btn=D('btnTeacher'),pal=D('tpal');
  btn.classList.toggle('btn-sec',!ST8.teacherMode);
  btn.classList.toggle('btn-p',ST8.teacherMode);
  btn.textContent=ST8.teacherMode?'✏️ 完成設計':'✏️ 老師設計';
  pal.classList.toggle('show',ST8.teacherMode);
  if(ST8.teacherMode){selectNote(null,'Q');showFB('老師模式：選音符後點上方格子設計題目','info',5000);}
  else{selectNote(null,'A');showFB('設計完成！可讓學生直接書寫或播放檢查','info',3500);}
}
function toggleMetro(){
  ST8.metroSound=!ST8.metroSound;
  const btn=D('btnMetro');
  btn.classList.toggle('btn-p',ST8.metroSound);
  btn.classList.toggle('btn-sec',!ST8.metroSound);
  showFB(ST8.metroSound?'播放時會有節拍音':'播放時不會有節拍音','info',2000);
}

function clearQ(){
  QS.reset();
  refresh('Q');selectNote(null,'A');showFB('題目已清除','info',2000);
}

// ─── RANDOM ───
const QPATS=[
  [{t:'quarter',d:4},{t:'quarter',d:4},{t:'quarter',d:4},{t:'quarter',d:4}],
  [{t:'eighth',d:2},{t:'eighth',d:2},{t:'quarter',d:4},{t:'quarter',d:4},{t:'eighth',d:2},{t:'eighth',d:2}],
  [{t:'quarter',d:4},{t:'eighth',d:2},{t:'eighth',d:2},{t:'sixteenth',d:1},{t:'sixteenth',d:1},{t:'eighth',d:2},{t:'quarter',d:4}],
  [{t:'eighth-rest',d:2},{t:'eighth',d:2},{t:'quarter',d:4},{t:'quarter-rest',d:4},{t:'quarter',d:4}],
  [{t:'sixteenth',d:1},{t:'sixteenth',d:1},{t:'sixteenth',d:1},{t:'sixteenth',d:1},{t:'eighth',d:2},{t:'eighth',d:2},{t:'quarter',d:4},{t:'eighth',d:2},{t:'eighth',d:2}],
  [{t:'dotted-eighth',d:3},{t:'sixteenth',d:1},{t:'quarter',d:4},{t:'eighth',d:2},{t:'eighth',d:2},{t:'dotted-eighth',d:3},{t:'sixteenth',d:1}],
  [{t:'quarter',d:4},{t:'dotted-eighth',d:3},{t:'sixteenth',d:1},{t:'eighth',d:2},{t:'eighth',d:2},{t:'quarter',d:4}],
  [{t:'eighth-rest',d:2},{t:'eighth',d:2},{t:'eighth-rest',d:2},{t:'eighth',d:2},{t:'eighth-rest',d:2},{t:'eighth',d:2},{t:'quarter',d:4}],
  [{t:'sixteenth',d:1},{t:'dotted-eighth',d:3},{t:'sixteenth',d:1},{t:'dotted-eighth',d:3},{t:'sixteenth',d:1},{t:'sixteenth',d:1},{t:'eighth',d:2},{t:'quarter',d:4}],
];
function newRandom(){
  QS.reset();
  const raw=QPATS[Math.floor(Math.random()*QPATS.length)];
  let cell=0;raw.forEach(n=>{if(cell+n.d<=16){QS.place(cell,n.t,true);cell+=n.d;}});
  while(cell<16){
    const fill='sixteenth';
    QS.place(cell,fill,true);
    cell+=1;
  }
  refresh('Q');showFB('新題目！按播放讓學生聽寫','ok',3000);
}

// ─── CHECK ANSWER ───
function checkAnswer(){
  if(!QS.notes.length){showFB('先設計或隨機一個題目！','hint');return;}
  if(!AS.isFull()){showFB('請填滿所有16格再檢查！','hint');return;}
  let ok=true;
  for(let i=0;i<16;i++){
    const match=QS.cells[i].type===AS.cells[i].type;
    if(!match)ok=false;
    const c=D(`ac${i}`);if(!c)continue;
    c.classList.remove('c-ok','c-bad');
    if(match)c.classList.add('c-ok');
    else{c.classList.add('c-bad');setTimeout(()=>c.classList.remove('c-bad'),480);}
  }
  if(ok){showFB('✅ 完全正確！','ok',6000);AU.ding(true);confetti();D('acard').classList.add('do-glow');setTimeout(()=>D('acard').classList.remove('do-glow'),2200);}
  else{showFB('❌ 有些地方不對，再聽一次！','warn');AU.ding(false);}
}

// ─── FEEDBACK ───
let fbT=null;
function showFB(msg,type='info',dur=3500){
  const e=D('fbmsg');e.className=`fbmsg ${type} show`;
  D('fbico').textContent=type==='ok'?'🎉':type==='warn'?'⛔':type==='hint'?'⚠️':'💡';
  D('fbtxt').textContent=msg;
  if(fbT)clearTimeout(fbT);fbT=setTimeout(()=>e.classList.remove('show'),dur);
}

// ─── CONFETTI ───
function confetti(){
  const cols=['var(--q)','var(--e)','var(--sv)','var(--de)','var(--ok)','#fff'];
  for(let i=0;i<28;i++){
    const p=document.createElement('div');p.className='cf';
    p.style.cssText=`left:${Math.random()*100}vw;top:-5px;background:${cols[~~(Math.random()*cols.length)]};animation-duration:${.55+Math.random()*1}s;animation-delay:${Math.random()*.25}s;width:${5+~~(Math.random()*5)}px;height:${5+~~(Math.random()*5)}px`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),2000);
  }
}

// ─── CROSS-BEAT ───
function toggleCross(){
  ST8.crossBeat=!ST8.crossBeat;
  const btn=D('btnCross');
  btn.classList.toggle('on',ST8.crossBeat);
  btn.textContent=ST8.crossBeat?'跨拍：開':'跨拍：關';
  refresh('both');
  showFB(ST8.crossBeat?'跨拍已開啟：音符可橫跨節拍線':'跨拍已關閉','info',2500);
}
// ─── PRECOUNT TOGGLE VISUAL ───
function syncToggle(){
  const checked=D('togPre').checked;
  D('togTrack').style.background=checked?'var(--q)':'var(--s3)';
  D('togTrack').style.borderColor=checked?'var(--q)':'var(--br2)';
  D('togThumb').style.right=checked?'1px':'';
  D('togThumb').style.left=checked?'':'1px';
}

// ─── INIT ───
function switchTab(t){
  document.getElementById('qcard').style.display = t==='Q'?'block':'none';
  document.getElementById('acard').style.display = t==='A'?'block':'none';
  document.getElementById('tabQ').style.background = t==='Q'?'var(--q)':'transparent';
  document.getElementById('tabQ').style.color = t==='Q'?'#fff':'var(--tx2)';
  document.getElementById('tabA').style.background = t==='A'?'var(--q)':'transparent';
  document.getElementById('tabA').style.color = t==='A'?'#fff':'var(--tx2)';
}

function updateMobileBar(){
  const bar=document.getElementById('mobileBar');
  if(!bar)return;
  bar.style.display = window.innerWidth <= 900 ? 'flex' : 'none';
}

function syncMobileBPM(value){
  const bpmM=D('bpms-m'); if(bpmM) bpmM.value=value;
  const bpmvM=D('bpmv-m'); if(bpmvM) bpmvM.textContent=value;
}

function init(){
  AU.init();
  buildPal(NOTES_ONLY,'tpal-items','Q');
  buildPal(NOTES_ONLY,'spal-items','A');
  refresh('both');
  D('btnPlay').addEventListener('click',playMain);
  D('btnRandom').addEventListener('click',newRandom);
  D('btnTeacher').addEventListener('click',toggleTeacher);
  D('btnQClear').addEventListener('click',clearQ);
  D('btnCheck').addEventListener('click',checkAnswer);
  D('btnAReset').addEventListener('click',()=>{
    AS.reset();ST8.markers.fill(false);
    for(let i=0;i<16;i++)D(`mk${i}`)?.classList.remove('on');
    refresh('A');for(let i=0;i<16;i++)D(`ac${i}`)?.classList.remove('c-ok','c-bad');
    showFB('學生作答已重置','info',1800);
  });
  D('btnMetro').addEventListener('click',toggleMetro);
  D('btnCross').addEventListener('click',toggleCross);
  D('bpms').addEventListener('input',e=>{
    const v=e.target.value;
    D('bpminput').value=v;
    D('bpmv').textContent=v;
    syncMobileBPM(v);
    AU.bpm=parseInt(v);
  });
  const mobileBpms=D('bpms-m');
  if(mobileBpms){
    mobileBpms.addEventListener('input',e=>{
      const v=e.target.value;
      D('bpms').value=v;
      D('bpminput').value=v;
      D('bpmv').textContent=v;
      syncMobileBPM(v);
      AU.bpm=parseInt(v);
    });
  }
  D('bpminput').addEventListener('change',e=>{
    let v=parseInt(e.target.value);
    if(isNaN(v))v=76;
    v=Math.max(40,Math.min(200,v));
    D('bpminput').value=v;
    D('bpms').value=v;
    D('bpmv').textContent=v;
    syncMobileBPM(v);
    AU.bpm=v;
  });
  D('bpminput').addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'||e.key==='ArrowDown'){
      let v=parseInt(D('bpminput').value)||76;
      v = e.key==='ArrowUp' ? Math.min(200,v+1) : Math.max(40,v-1);
      D('bpminput').value=v;
      D('bpms').value=v;
      D('bpmv').textContent=v;
      syncMobileBPM(v);
      AU.bpm=v;
      e.preventDefault();
    }
  });
  D('togPre').addEventListener('change',syncToggle);syncToggle();
  updateMobileBar();
  window.addEventListener('resize', updateMobileBar);
  document.addEventListener('keydown',e=>{if(e.key==='Escape')selectNote(null,'A');});
  document.addEventListener('pointerdown',()=>AU.wake(),{passive:true});
  showFB('歡迎！🎲 隨機出題 或 ✏️ 老師設計，播放後讓學生聽寫並填入下方！','info',7000);
  switchTab('Q');
}
document.addEventListener('DOMContentLoaded',init);
</script>
<div id="mobileBar" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;background:rgba(7,11,20,.95);backdrop-filter:blur(16px);border-top:1px solid var(--br2);padding:8px 16px 12px;display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:10px">
  <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
    <span style="font-size:10px;color:var(--tx3);font-family:'Space Mono',monospace">BPM</span>
    <input type="range" class="bpms" id="bpms-m" min="40" max="200" value="76" style="width:80px">
    <span style="font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--tx)" id="bpmv-m">76</span>
  </div>
  <button onclick="document.getElementById('btnPlay').click()" style="width:48px;height:48px;border-radius:50%;background:var(--q);border:none;color:#fff;font-size:20px;box-shadow:0 4px 18px var(--qg);display:flex;align-items:center;justify-content:center;flex-shrink:0">▶</button>
  <button onclick="document.getElementById('btnRandom').click()" style="padding:10px 14px;border-radius:10px;background:var(--s3);border:1px solid var(--br2);color:var(--tx);font-size:12px;font-weight:700">🎲</button>
</div>
</body>
</html>
